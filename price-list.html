<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>價目表管理 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user">
            <button class="btn-secondary" onclick="location.href='dashboard-simple.html'">← 返回列表</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header price-list-header">
                <div>
                    <h2>💰 價目表管理</h2>
                    <p class="page-subtitle">固定分類管理、搜尋、狀態切換與 CRUD，供新增 / 編輯報價直接選用。</p>
                </div>
                <div class="action-group">
                    <button class="btn btn-secondary" onclick="seedPriceList()">🌱 建立測試資料</button>
                    <button class="btn btn-primary" onclick="openItemModal()">➕ 新增項目</button>
                </div>
            </div>

            <div class="toolbar">
                <div class="tabs" id="categoryTabs"></div>
                <div class="toolbar-row">
                    <input type="text" id="searchInput" placeholder="搜尋項目名稱 / 規格 / 備註" oninput="searchDebounced()">
                    <select id="statusFilter" onchange="renderPriceItems()">
                        <option value="">全部狀態</option>
                        <option value="啟用">啟用</option>
                        <option value="停用">停用</option>
                    </select>
                </div>
            </div>

            <div id="statsBar" class="stats-bar"></div>

            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>分類</th>
                            <th>項目名稱</th>
                            <th>規格說明</th>
                            <th>單價</th>
                            <th>單位</th>
                            <th>備註</th>
                            <th>狀態</th>
                            <th>更新日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="priceListBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="itemModal" class="pl-modal">
        <div class="pl-modal-dialog">
            <div class="pl-modal-header">
                <h3 id="modalTitle">新增項目</h3>
                <button type="button" class="icon-button" onclick="closeItemModal()">&times;</button>
            </div>
            <form id="itemForm" class="pl-form">
                <input type="hidden" id="itemId">
                <div class="form-grid-2">
                    <div class="form-row">
                        <label>分類 *</label>
                        <select id="itemCategory" required></select>
                    </div>
                    <div class="form-row">
                        <label>狀態 *</label>
                        <select id="itemStatus" required>
                            <option value="啟用">啟用</option>
                            <option value="停用">停用</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <label>項目名稱 *</label>
                    <input type="text" id="itemName" required maxlength="100" placeholder="例如：電動麻將桌 M1">
                </div>
                <div class="form-row">
                    <label>規格說明</label>
                    <textarea id="itemSpec" maxlength="200" rows="3" placeholder="例如：四口機種，含基本安裝"></textarea>
                </div>
                <div class="form-grid-2">
                    <div class="form-row">
                        <label>單價 *</label>
                        <input type="number" id="itemPrice" required min="0" max="9999999" step="0.01" value="0">
                    </div>
                    <div class="form-row">
                        <label>單位</label>
                        <input type="text" id="itemUnit" maxlength="20" placeholder="台 / 組 / 式">
                    </div>
                </div>
                <div class="form-row">
                    <label>備註</label>
                    <textarea id="itemNote" maxlength="500" rows="3" placeholder="例如：適用標準門市、含基本安裝"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">💾 儲存</button>
                    <button type="button" class="btn btn-secondary" onclick="closeItemModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="utils.js?v=20260320d"></script>
    <script src="auth.js?v=20260320d"></script>
    <script src="toast.js?v=20260320d"></script>
    <script src="config-api.js?v=20260320d"></script>
    <script src="api-quote.js?v=20260320d"></script>
    <script>
        const FIXED_CATEGORIES = ['麻將桌', '冷氣', '水電配線', '輕隔間', '包廂門', '智能門鎖', '其他設備'];
        const currentUser = Auth.requireLogin();
        let allItems = [];
        let currentCategory = FIXED_CATEGORIES[0];
        let editingId = null;

        if (!currentUser) {
            console.warn('未登入或登入資訊失效，停止載入 price-list');
        } else {
            const searchDebounced = Utils.debounce(renderPriceItems, 250);
            window.searchDebounced = searchDebounced;

            function buildTabs() {
                const tabs = document.getElementById('categoryTabs');
                tabs.innerHTML = FIXED_CATEGORIES.map(category => `
                    <button type="button" class="tab-button ${category === currentCategory ? 'active' : ''}" data-category="${Utils.escapeHtml(category)}">${Utils.escapeHtml(category)}</button>
                `).join('');
                tabs.querySelectorAll('[data-category]').forEach(button => {
                    button.addEventListener('click', () => {
                        currentCategory = button.getAttribute('data-category') || FIXED_CATEGORIES[0];
                        buildTabs();
                        renderPriceItems();
                    });
                });
            }

            function populateCategorySelect() {
                document.getElementById('itemCategory').innerHTML = FIXED_CATEGORIES.map(category => `
                    <option value="${Utils.escapeHtml(category)}">${Utils.escapeHtml(category)}</option>
                `).join('');
            }

            async function loadItems() {
                const result = await QuoteAPI.getPriceTable();
                if (!result.success) {
                    Toast.error('價目表載入失敗：' + (result.error || '未知錯誤'));
                    return;
                }
                allItems = result.items || [];
                renderPriceItems();
            }

            function renderStats(filtered) {
                const activeCount = filtered.filter(item => (item.status || '啟用') === '啟用').length;
                const inactiveCount = filtered.length - activeCount;
                document.getElementById('statsBar').innerHTML = `
                    <div class="stat-card"><strong>${filtered.length}</strong><span>目前分類項目數</span></div>
                    <div class="stat-card"><strong>${activeCount}</strong><span>啟用中</span></div>
                    <div class="stat-card"><strong>${inactiveCount}</strong><span>停用中</span></div>
                `;
            }

            function renderPriceItems() {
                const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
                const statusFilter = document.getElementById('statusFilter').value;
                let filtered = allItems.filter(item => item.category === currentCategory);
                if (statusFilter) {
                    filtered = filtered.filter(item => (item.status || '啟用') === statusFilter);
                }
                if (keyword) {
                    filtered = filtered.filter(item => `${item.name || ''} ${item.spec || item.description || ''} ${item.note || item.remark || ''}`.toLowerCase().includes(keyword));
                }
                renderStats(filtered);
                const tbody = document.getElementById('priceListBody');
                if (!filtered.length) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:36px;color:#94a3b8;">此分類目前沒有符合條件的價目資料</td></tr>';
                    return;
                }
                tbody.innerHTML = filtered.map(item => `
                    <tr>
                        <td>${Utils.escapeHtml(item.category || '-')}</td>
                        <td><strong>${Utils.escapeHtml(item.name || '-')}</strong></td>
                        <td>${Utils.escapeHtml(item.spec || item.description || '-')}</td>
                        <td>${Utils.formatPrice(item.price)}</td>
                        <td>${Utils.escapeHtml(item.unit || '-')}</td>
                        <td>${Utils.escapeHtml(item.note || item.remark || '-')}</td>
                        <td><button type="button" class="status-pill ${(item.status || '啟用') === '啟用' ? 'active' : 'inactive'}" onclick="toggleStatus('${Utils.escapeHtml(item.id)}')">${Utils.escapeHtml(item.status || '啟用')}</button></td>
                        <td>${Utils.formatDateTime(item.updatedAt || item.createdAt)}</td>
                        <td>
                            <div class="action-buttons">
                                <button type="button" class="btn btn-sm btn-primary" onclick="openItemModal('${Utils.escapeHtml(item.id)}')">✏️ 編輯</button>
                                <button type="button" class="btn btn-sm btn-danger" onclick="deleteItem('${Utils.escapeHtml(item.id)}', '${Utils.escapeHtml(item.name || '')}')">🗑️ 刪除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            function validateItemForm() {
                const category = document.getElementById('itemCategory').value.trim();
                const name = document.getElementById('itemName').value.trim();
                const price = parseFloat(document.getElementById('itemPrice').value || 0);
                if (!FIXED_CATEGORIES.includes(category)) {
                    Toast.error('請選擇正確的固定分類');
                    return false;
                }
                if (!name) {
                    Toast.error('請輸入項目名稱');
                    document.getElementById('itemName').focus();
                    return false;
                }
                if (name.length > 100) {
                    Toast.error('項目名稱不可超過 100 字');
                    return false;
                }
                if (!Utils.validateNumber(price, 0, 9999999)) {
                    Toast.error('單價必須介於 0 到 9,999,999');
                    document.getElementById('itemPrice').focus();
                    return false;
                }
                return true;
            }

            function getItemPayload() {
                return {
                    id: document.getElementById('itemId').value || undefined,
                    category: document.getElementById('itemCategory').value.trim(),
                    name: document.getElementById('itemName').value.trim(),
                    spec: document.getElementById('itemSpec').value.trim(),
                    description: document.getElementById('itemSpec').value.trim(),
                    price: parseFloat(document.getElementById('itemPrice').value || 0),
                    unit: document.getElementById('itemUnit').value.trim(),
                    note: document.getElementById('itemNote').value.trim(),
                    remark: document.getElementById('itemNote').value.trim(),
                    status: document.getElementById('itemStatus').value
                };
            }

            function resetForm() {
                document.getElementById('itemForm').reset();
                document.getElementById('itemCategory').value = currentCategory;
                document.getElementById('itemStatus').value = '啟用';
                document.getElementById('itemPrice').value = 0;
                document.getElementById('itemId').value = '';
            }

            window.openItemModal = function(id = '') {
                editingId = id || null;
                resetForm();
                if (editingId) {
                    const item = allItems.find(entry => entry.id === editingId);
                    if (!item) {
                        Toast.error('找不到要編輯的項目');
                        return;
                    }
                    document.getElementById('modalTitle').textContent = '編輯項目';
                    document.getElementById('itemId').value = item.id || '';
                    document.getElementById('itemCategory').value = item.category || currentCategory;
                    document.getElementById('itemStatus').value = item.status || '啟用';
                    document.getElementById('itemName').value = item.name || '';
                    document.getElementById('itemSpec').value = item.spec || item.description || '';
                    document.getElementById('itemPrice').value = Number(item.price || 0);
                    document.getElementById('itemUnit').value = item.unit || '';
                    document.getElementById('itemNote').value = item.note || item.remark || '';
                } else {
                    document.getElementById('modalTitle').textContent = '新增項目';
                }
                document.getElementById('itemModal').classList.add('open');
            };

            window.closeItemModal = function() {
                document.getElementById('itemModal').classList.remove('open');
                editingId = null;
            };

            window.toggleStatus = async function(id) {
                const item = allItems.find(entry => entry.id === id);
                if (!item) return;
                const nextStatus = (item.status || '啟用') === '啟用' ? '停用' : '啟用';
                const result = await QuoteAPI.updatePriceItem(id, { ...item, status: nextStatus });
                if (!result.success) {
                    Toast.error('狀態更新失敗：' + (result.error || '未知錯誤'));
                    return;
                }
                Toast.success(`已切換為${nextStatus}`);
                await loadItems();
            };

            window.deleteItem = async function(id, name) {
                if (!confirm(`確定要刪除「${name}」嗎？\n此操作無法復原。`)) return;
                const result = await QuoteAPI.deletePriceItem(id);
                if (!result.success) {
                    Toast.error('刪除失敗：' + (result.error || '未知錯誤'));
                    return;
                }
                Toast.success('項目已刪除');
                await loadItems();
            };

            window.seedPriceList = async function() {
                if (!confirm('將補齊每個分類至少 3 筆測試資料，不會清空現有正式資料，是否繼續？')) return;
                const result = await QuoteAPI.seedPriceList();
                if (!result.success) {
                    Toast.error('建立測試資料失敗：' + (result.error || '未知錯誤'));
                    return;
                }
                Toast.success(result.message || '測試資料已建立');
                await loadItems();
            };

            document.getElementById('itemForm').addEventListener('submit', async (event) => {
                event.preventDefault();
                if (!validateItemForm()) return;
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.textContent = '儲存中...';
                const payload = getItemPayload();
                const result = editingId
                    ? await QuoteAPI.updatePriceItem(editingId, payload)
                    : await QuoteAPI.addPriceItem(payload);
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 儲存';
                if (!result.success) {
                    Toast.error('儲存失敗：' + (result.error || '未知錯誤'));
                    return;
                }
                Toast.success(editingId ? '項目已更新' : '項目已新增');
                closeItemModal();
                await loadItems();
            });

            document.getElementById('itemModal').addEventListener('click', (event) => {
                if (event.target.id === 'itemModal') {
                    closeItemModal();
                }
            });

            populateCategorySelect();
            buildTabs();
            loadItems();
        }
    </script>

    <style>
        .price-list-header { align-items: start; }
        .page-subtitle { margin: 8px 0 0; color: #64748b; }
        .action-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .toolbar { padding: 20px; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: grid; gap: 16px; }
        .toolbar-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .toolbar-row input, .toolbar-row select { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; }
        .toolbar-row input { flex: 1; min-width: 260px; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-button { border: 1px solid #cbd5e1; background: #f8fafc; padding: 8px 14px; border-radius: 999px; cursor: pointer; }
        .tab-button.active { background: #2563eb; color: white; border-color: #2563eb; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; padding: 16px 20px 0; }
        .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 6px; }
        .stat-card strong { font-size: 22px; color: #0f172a; }
        .stat-card span { color: #64748b; font-size: 13px; }
        .table-wrap { padding: 20px; overflow-x: auto; }
        .status-pill { border: none; border-radius: 999px; padding: 6px 10px; cursor: pointer; }
        .status-pill.active { background: #dcfce7; color: #166534; }
        .status-pill.inactive { background: #fee2e2; color: #991b1b; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .pl-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 1800; }
        .pl-modal.open { display: flex; }
        .pl-modal-dialog { background: #fff; width: min(720px, 100%); border-radius: 16px; box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24); overflow: hidden; }
        .pl-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #e2e8f0; }
        .icon-button { background: none; border: none; font-size: 28px; cursor: pointer; color: #64748b; }
        .pl-form { padding: 20px 24px 24px; display: grid; gap: 14px; }
        .form-grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        @media (max-width: 768px) {
            .stats-bar, .form-grid-2 { grid-template-columns: 1fr; }
            .toolbar-row { flex-direction: column; }
            .toolbar-row input { min-width: 0; }
        }
    </style>
</body>
</html>
