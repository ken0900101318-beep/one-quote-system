<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據統計 - ONE桌遊報價管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" style="width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-right: 10px;">
            ONE桌遊報價管理系統
        </div>
        <div class="navbar-user">
            <button class="btn-logout" onclick="location.href='dashboard.html'">← 返回</button>
        </div>
    </nav>

    <div class="container">
        <h1 style="margin-bottom: 30px;">📊 數據統計分析</h1>

        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">總專案數</div>
                <div class="stat-value" id="totalProjects">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--success);">
                <div class="stat-label">總營收</div>
                <div class="stat-value">$<span id="totalRevenue">0</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--warning);">
                <div class="stat-label">待收款</div>
                <div class="stat-value">$<span id="pendingAmount">0</span></div>
            </div>
            <div class="stat-card" style="border-left-color: var(--info);">
                <div class="stat-label">平均報價</div>
                <div class="stat-value">$<span id="avgQuote">0</span></div>
            </div>
        </div>

        <!-- 月收款報表 -->
        <div class="card">
            <h2>💰 本月收款明細</h2>
            <table class="table" id="monthlyPayments">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>專案</th>
                        <th>期別</th>
                        <th>金額</th>
                        <th>付款方式</th>
                    </tr>
                </thead>
                <tbody id="paymentsTableBody"></tbody>
            </table>
        </div>

        <!-- 熱門項目排行 -->
        <div class="card">
            <h2>🏆 熱門項目排行</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>項目名稱</th>
                        <th>報價次數</th>
                        <th>總數量</th>
                        <th>總金額</th>
                    </tr>
                </thead>
                <tbody id="topItems"></tbody>
            </table>
        </div>

        <!-- 業績統計 -->
        <div class="card">
            <h2>📈 負責人業績</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>負責人</th>
                        <th>專案數</th>
                        <th>報價總額</th>
                        <th>已收款</th>
                        <th>收款率</th>
                    </tr>
                </thead>
                <tbody id="userStats"></tbody>
            </table>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const projects = JSON.parse(localStorage.getItem('projects') || '[]');
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        
        // 總統計
        document.getElementById('totalProjects').textContent = projects.length;
        
        const totalRevenue = projects.reduce((sum, p) => sum + p.paidAmount, 0);
        document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString();
        
        const pendingAmount = projects.reduce((sum, p) => sum + (p.totalAmount - p.paidAmount), 0);
        document.getElementById('pendingAmount').textContent = pendingAmount.toLocaleString();
        
        const avgQuote = projects.length > 0 ? Math.round(projects.reduce((sum, p) => sum + p.totalAmount, 0) / projects.length) : 0;
        document.getElementById('avgQuote').textContent = avgQuote.toLocaleString();
        
        // 本月收款
        const thisMonth = new Date().toISOString().slice(0, 7);
        const monthlyPayments = [];
        
        projects.forEach(project => {
            (project.payments || []).forEach(payment => {
                if (payment.date.startsWith(thisMonth)) {
                    monthlyPayments.push({
                        ...payment,
                        projectName: project.storeName
                    });
                }
            });
        });
        
        monthlyPayments.sort((a, b) => b.date.localeCompare(a.date));
        
        document.getElementById('paymentsTableBody').innerHTML = monthlyPayments.map(p => `
            <tr>
                <td>${p.date}</td>
                <td>${p.projectName}</td>
                <td>${p.type}</td>
                <td><strong>$${p.amount.toLocaleString()}</strong></td>
                <td>${p.method}</td>
            </tr>
        `).join('') || '<tr><td colspan="5" style="text-align: center; color: #999;">本月暫無收款記錄</td></tr>';
        
        // 熱門項目
        const itemStats = {};
        
        projects.forEach(project => {
            const latestQuote = project.quoteVersions?.[project.quoteVersions.length - 1];
            if (!latestQuote) return;
            
            latestQuote.items.forEach(item => {
                if (!itemStats[item.name]) {
                    itemStats[item.name] = { name: item.name, count: 0, totalQty: 0, totalAmount: 0 };
                }
                itemStats[item.name].count++;
                itemStats[item.name].totalQty += item.quantity;
                itemStats[item.name].totalAmount += item.total;
            });
        });
        
        const topItems = Object.values(itemStats).sort((a, b) => b.totalAmount - a.totalAmount).slice(0, 10);
        
        document.getElementById('topItems').innerHTML = topItems.map((item, index) => `
            <tr>
                <td><strong>${index + 1}</strong></td>
                <td>${item.name}</td>
                <td>${item.count} 次</td>
                <td>${item.totalQty}</td>
                <td><strong>$${item.totalAmount.toLocaleString()}</strong></td>
            </tr>
        `).join('') || '<tr><td colspan="5" style="text-align: center; color: #999;">暫無數據</td></tr>';
        
        // 業績統計
        const userStatsData = {};
        
        users.filter(u => u.role === 'admin' || u.role === 'staff').forEach(user => {
            userStatsData[user.id] = {
                name: user.name,
                projectCount: 0,
                totalAmount: 0,
                paidAmount: 0
            };
        });
        
        projects.forEach(project => {
            if (userStatsData[project.assignee]) {
                userStatsData[project.assignee].projectCount++;
                userStatsData[project.assignee].totalAmount += project.totalAmount;
                userStatsData[project.assignee].paidAmount += project.paidAmount;
            }
        });
        
        document.getElementById('userStats').innerHTML = Object.values(userStatsData)
            .filter(u => u.projectCount > 0)
            .sort((a, b) => b.paidAmount - a.paidAmount)
            .map(user => {
                const rate = user.totalAmount > 0 ? Math.round(user.paidAmount / user.totalAmount * 100) : 0;
                return `
                    <tr>
                        <td><strong>${user.name}</strong></td>
                        <td>${user.projectCount} 個</td>
                        <td>$${user.totalAmount.toLocaleString()}</td>
                        <td><strong>$${user.paidAmount.toLocaleString()}</strong></td>
                        <td>
                            <div class="progress-bar" style="height: 20px;">
                                <div class="progress-fill" style="width: ${rate}%"></div>
                            </div>
                            <div style="text-align: center; margin-top: 3px;">${rate}%</div>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="5" style="text-align: center; color: #999;">暫無數據</td></tr>';
    </script>
</body>
</html>
