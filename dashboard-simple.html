<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案列表 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user">
            <span id="userName">載入中...</span>
            <button class="btn-logout" onclick="logout()">登出</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>📋 專案列表</h2>
                <div>
                    <button class="btn btn-secondary" onclick="location.href='category-management-cloud.html'" style="margin-right: 10px;">🗂️ 分類管理</button>
                    <button class="btn btn-primary" onclick="location.href='create-quote-simple.html'">➕ 新增報價</button>
                </div>
            </div>

            <div class="filters" style="padding: 15px; border-bottom: 1px solid #ddd;">
                <select id="statusFilter" onchange="loadProjects()" style="padding: 8px; margin-right: 10px;">
                    <option value="">全部狀態</option>
                    <option value="quoted">已報價</option>
                    <option value="signed">已簽約</option>
                    <option value="construction">施工中</option>
                    <option value="completed">已完工</option>
                </select>
                
                <input type="text" id="searchInput" placeholder="搜尋客戶名稱或專案編號..." 
                       onkeyup="searchDebounced()" style="padding: 8px; width: 300px;">
            </div>

            <!-- Loading 狀態 -->
            <div id="loadingState" style="display: none; text-align: center; padding: 40px;">
                <div class="spinner"></div>
                <p>載入中...</p>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>專案編號</th>
                        <th>客戶姓名</th>
                        <th>聯絡電話</th>
                        <th>總價</th>
                        <th>狀態</th>
                        <th>建立時間</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="projectList"></tbody>
            </table>
        </div>
    </div>

    <!-- 引入共用工具 -->
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="toast.js"></script>
    <script src="config-api.js"></script>
    <script src="api-quote.js"></script>
    <script>
        const statusNames = {
            'quoted': '已報價',
            'signed': '已簽約',
            'construction': '施工中',
            'completed': '已完工'
        };
        
        let allProjects = [];
        let isLoading = false;
        
        // 檢查登入（使用共用工具）
        const currentUser = Auth.requireLogin();
        if (!currentUser) return;
        
        // 顯示使用者
        document.getElementById('userName').textContent = `${currentUser.avatar || ''} ${currentUser.name}`;
        
        // 顯示/隱藏 Loading
        function showLoading(show) {
            isLoading = show;
            document.getElementById('loadingState').style.display = show ? 'block' : 'none';
            document.querySelector('.table').style.display = show ? 'none' : 'table';
        }
        
        // 載入專案列表
        async function loadProjects() {
            if (isLoading) return;
            
            showLoading(true);
            
            try {
                const result = await QuoteAPI.getProjects();
                
                if (result.success) {
                    allProjects = result.projects || [];
                    filterProjects();
                    Toast.success(`已載入 ${allProjects.length} 個專案`);
                } else {
                    Toast.error('載入失敗：' + result.error);
                }
            } catch (error) {
                console.error('載入專案失敗:', error);
                Toast.error('連線失敗：' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        // 搜尋防抖（使用共用工具）
        const searchDebounced = Utils.debounce(filterProjects, 300);
        
        // 篩選專案
        function filterProjects() {
            const statusFilter = document.getElementById('statusFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allProjects;
            
            // 狀態篩選
            if (statusFilter) {
                filtered = filtered.filter(p => p.status === statusFilter);
            }
            
            // 搜尋篩選
            if (searchText) {
                filtered = filtered.filter(p => 
                    (p.customerName || '').toLowerCase().includes(searchText) ||
                    (p.projectNumber || '').toLowerCase().includes(searchText)
                );
            }
            
            renderProjects(filtered);
        }
        
        // 顯示專案（修正 XSS 漏洞）
        function renderProjects(projects) {
            const tbody = document.getElementById('projectList');
            
            if (projects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">暫無專案資料</td></tr>';
                return;
            }
            
            tbody.innerHTML = projects.map(p => `
                <tr>
                    <td>${Utils.escapeHtml(p.projectNumber) || '-'}</td>
                    <td>${Utils.escapeHtml(p.customerName) || '-'}</td>
                    <td>${Utils.escapeHtml(p.phone) || '-'}</td>
                    <td>${Utils.formatPrice(p.totalPrice)}</td>
                    <td><span class="status-badge status-${Utils.escapeHtml(p.status)}">${Utils.escapeHtml(statusNames[p.status] || p.status)}</span></td>
                    <td>${Utils.formatDate(p.createdAt)}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editProject('${Utils.escapeHtml(p.id)}')">✏️ 編輯</button>
                        <button class="btn btn-sm btn-secondary" onclick="viewProject('${Utils.escapeHtml(p.id)}')">👁️ 檢視</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProject('${Utils.escapeHtml(p.id)}')">🗑️ 刪除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 編輯專案
        function editProject(id) {
            location.href = `edit-quote.html?id=${encodeURIComponent(id)}`;
        }
        
        // 檢視專案
        function viewProject(id) {
            location.href = `view-quote.html?id=${encodeURIComponent(id)}`;
        }
        
        // 刪除專案（加入確認對話框）
        async function deleteProject(id) {
            const project = allProjects.find(p => p.id === id);
            if (!project) {
                Toast.error('找不到專案');
                return;
            }
            
            if (!confirm(`⚠️ 確定要刪除專案「${project.customerName}」嗎？\n\n此操作無法復原！`)) {
                return;
            }
            
            // 樂觀更新 UI（立即移除）
            allProjects = allProjects.filter(p => p.id !== id);
            filterProjects();
            
            try {
                const result = await QuoteAPI.deleteProject(id);
                
                if (result.success) {
                    Toast.success('已成功刪除專案');
                } else {
                    Toast.error('刪除失敗：' + result.error);
                    // 失敗時重新載入
                    await loadProjects();
                }
            } catch (error) {
                console.error('刪除失敗:', error);
                Toast.error('連線失敗：' + error.message);
                // 失敗時重新載入
                await loadProjects();
            }
        }
        
        // 登出（使用共用工具）
        function logout() {
            Auth.logout();
        }
        
        // 頁面載入時執行
        loadProjects();
        
        // 快捷鍵：N = 新增報價
        document.addEventListener('keydown', (e) => {
            if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !e.target.matches('input, textarea')) {
                location.href = 'create-quote-simple.html';
            }
        });
    </script>
    
    <style>
        /* Loading 動畫 */
        .spinner {
            margin: 0 auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 行動裝置優化 */
        @media (max-width: 768px) {
            .table {
                display: none;
            }
            
            #projectList {
                display: block !important;
            }
            
            #projectList tr {
                display: block;
                margin-bottom: 15px;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 15px;
                background: white;
            }
            
            #projectList td {
                display: block;
                padding: 8px 0;
                border: none;
            }
            
            #projectList td:before {
                content: attr(data-label);
                font-weight: bold;
                margin-right: 10px;
            }
            
            .filters {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            
            .filters select,
            .filters input {
                width: 100% !important;
                margin: 0 !important;
            }
        }
    </style>
</body>
</html>
