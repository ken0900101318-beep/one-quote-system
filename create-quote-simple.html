<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增報價 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user">
            <button class="btn-secondary" onclick="goBack()">← 返回列表</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>➕ 新增報價</h2>
            </div>

            <form id="quoteForm" style="padding: 20px;">
                <h3>基本資訊</h3>
                <div class="form-row">
                    <label>客戶姓名 *</label>
                    <input type="text" id="customerName" required maxlength="50" placeholder="請輸入客戶姓名">
                </div>
                <div class="form-row">
                    <label>聯絡電話 *</label>
                    <input type="tel" id="phone" required pattern="09\d{8}" placeholder="0912345678">
                    <small style="color: #666;">格式：09 開頭，共 10 位數字</small>
                </div>
                <div class="form-row">
                    <label>專案編號（自動產生）</label>
                    <input type="text" id="projectNumber" readonly>
                </div>
                <div class="form-row">
                    <label>狀態</label>
                    <select id="status">
                        <option value="quoted">已報價</option>
                        <option value="signed">已簽約</option>
                        <option value="construction">施工中</option>
                        <option value="completed">已完工</option>
                    </select>
                </div>

                <h3 style="margin-top: 30px;">報價項目</h3>
                <div id="itemsContainer"></div>
                <button type="button" class="btn btn-secondary" onclick="addItem()">➕ 新增項目</button>

                <div style="margin-top: 30px; padding: 15px; background: #f0f0f0; border-radius: 5px;">
                    <h3>總計：$<span id="totalPrice">0</span></h3>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn">💾 儲存報價</button>
                    <button type="button" class="btn btn-secondary" onclick="goBack()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 引入共用工具 -->
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="toast.js"></script>
    <script src="config-api.js"></script>
    <script src="api-quote.js"></script>
    <script>
        // 檢查登入（使用共用工具）
        const currentUser = Auth.requireLogin();
        if (!currentUser) return;

        let itemCount = 0;
        let items = [];
        let formModified = false;
        let categories = []; // 儲存分類資料

        // 產生專案編號（使用共用工具）
        document.getElementById('projectNumber').value = Utils.generateProjectNo();

        // 監控表單變更
        document.getElementById('quoteForm').addEventListener('input', () => {
            formModified = true;
        });

        // 載入分類
        async function loadCategories() {
            try {
                const result = await QuoteAPI.getCategories();
                if (result.success && result.categories) {
                    categories = result.categories;
                    console.log('已載入分類:', categories.length, '個');
                } else {
                    console.warn('無法載入分類:', result.error || '未知錯誤');
                    categories = [];
                }
            } catch (error) {
                console.error('載入分類失敗:', error);
                categories = [];
            }
        }

        // 填充分類選單
        function populateCategorySelect(selectElement) {
            selectElement.innerHTML = '<option value="">請選擇分類</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.name;
                option.textContent = cat.name;
                selectElement.appendChild(option);
            });
        }

        // 返回前確認
        function goBack() {
            if (formModified && !confirm('⚠️ 表單尚未儲存，確定要離開嗎？')) {
                return;
            }
            location.href = 'dashboard-simple.html';
        }

        // 新增項目
        function addItem() {
            itemCount++;
            const container = document.getElementById('itemsContainer');
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item-row';
            itemDiv.id = `item${itemCount}`;
            itemDiv.style.cssText = 'border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; position: relative;';
            
            itemDiv.innerHTML = `
                <button type="button" onclick="removeItem(${itemCount})" 
                        style="position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">
                    ✕
                </button>
                <div class="form-row">
                    <label>項目名稱 *</label>
                    <input type="text" id="itemName${itemCount}" required maxlength="100">
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>分類</label>
                        <select id="itemCategory${itemCount}">
                            <option value="">請選擇分類</option>
                        </select>
                    </div>
                    <div>
                        <label>子分類</label>
                        <input type="text" id="itemSubCategory${itemCount}" maxlength="50" placeholder="選填">
                    </div>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div>
                        <label>數量 *</label>
                        <input type="number" id="itemQty${itemCount}" value="1" min="1" max="9999" required onchange="calculateTotal()">
                    </div>
                    <div>
                        <label>單價 *</label>
                        <input type="number" id="itemPrice${itemCount}" value="0" min="0" max="9999999" step="0.01" required onchange="calculateTotal()">
                    </div>
                    <div>
                        <label>小計</label>
                        <input type="text" id="itemSubtotal${itemCount}" readonly style="background: #f0f0f0;">
                    </div>
                </div>
                <div class="form-row">
                    <label>說明</label>
                    <input type="text" id="itemDesc${itemCount}" maxlength="200">
                </div>
            `;
            
            container.appendChild(itemDiv);
            items.push(itemCount);
            
            // 填充分類選單
            const categorySelect = document.getElementById(`itemCategory${itemCount}`);
            if (categorySelect) {
                populateCategorySelect(categorySelect);
            }
            
            calculateTotal();
        }

        // 移除項目（加入確認）
        function removeItem(id) {
            const itemName = document.getElementById(`itemName${id}`)?.value;
            
            // 如果項目有填寫內容，需要確認
            if (itemName && !confirm(`確定要移除項目「${itemName}」嗎？`)) {
                return;
            }
            
            const itemDiv = document.getElementById(`item${id}`);
            if (itemDiv) {
                itemDiv.remove();
                items = items.filter(i => i !== id);
                calculateTotal();
            }
        }

        // 計算總計（修正為使用 parseFloat 支援小數）
        function calculateTotal() {
            let total = 0;
            
            items.forEach(id => {
                const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                const subtotal = qty * price;
                
                const subtotalInput = document.getElementById(`itemSubtotal${id}`);
                if (subtotalInput) {
                    subtotalInput.value = Utils.formatPrice(subtotal);
                }
                
                total += subtotal;
            });
            
            document.getElementById('totalPrice').textContent = total.toLocaleString();
        }

        // 表單驗證
        function validateForm() {
            const customerName = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            // 姓名驗證
            if (!customerName || customerName.length < 2) {
                Toast.error('請輸入客戶姓名（至少 2 個字）');
                document.getElementById('customerName').focus();
                return false;
            }
            
            if (customerName.length > 50) {
                Toast.error('客戶姓名不可超過 50 個字');
                document.getElementById('customerName').focus();
                return false;
            }
            
            // 電話驗證
            if (!Utils.validatePhone(phone)) {
                Toast.error('請輸入正確的手機號碼（例如：0912345678）');
                document.getElementById('phone').focus();
                return false;
            }
            
            // 項目驗證
            let hasValidItem = false;
            items.forEach(id => {
                const name = document.getElementById(`itemName${id}`)?.value.trim();
                const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                
                if (name && qty > 0) {
                    hasValidItem = true;
                    
                    // 驗證數量範圍
                    if (!Utils.validateNumber(qty, 1, 9999)) {
                        Toast.error(`項目「${name}」的數量必須在 1-9999 之間`);
                        return false;
                    }
                    
                    // 驗證價格範圍
                    if (!Utils.validateNumber(price, 0, 9999999)) {
                        Toast.error(`項目「${name}」的單價必須在 0-9,999,999 之間`);
                        return false;
                    }
                }
            });
            
            if (!hasValidItem) {
                Toast.error('請至少新增一個報價項目');
                return false;
            }
            
            return true;
        }

        // 儲存報價
        document.getElementById('quoteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 表單驗證
            if (!validateForm()) {
                return;
            }
            
            // 停用按鈕防止重複提交
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '儲存中...';
            
            // 收集資料
            const projectData = {
                projectNumber: document.getElementById('projectNumber').value,
                customerName: document.getElementById('customerName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                status: document.getElementById('status').value,
                createdBy: currentUser.name,
                items: [],
                totalPrice: 0
            };
            
            // 收集項目
            let total = 0;
            items.forEach(id => {
                const name = document.getElementById(`itemName${id}`)?.value.trim() || '';
                const category = document.getElementById(`itemCategory${id}`)?.value.trim() || '';
                const subCategory = document.getElementById(`itemSubCategory${id}`)?.value.trim() || '';
                const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                const desc = document.getElementById(`itemDesc${id}`)?.value.trim() || '';
                
                if (name && qty > 0) {
                    const subtotal = qty * price;
                    projectData.items.push({
                        name, 
                        category, 
                        subCategory, 
                        qty, 
                        price, 
                        desc, 
                        subtotal
                    });
                    total += subtotal;
                }
            });
            
            projectData.totalPrice = total;
            
            try {
                console.log('準備儲存:', projectData);
                const result = await QuoteAPI.addProject(projectData);
                
                if (result.success) {
                    Toast.success('報價已成功儲存！');
                    formModified = false; // 重置表單變更標記
                    setTimeout(() => {
                        location.href = 'dashboard-simple.html';
                    }, 1000);
                } else {
                    Toast.error('儲存失敗：' + result.error);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '💾 儲存報價';
                }
            } catch (error) {
                console.error('儲存失敗:', error);
                Toast.error('連線失敗：' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 儲存報價';
            }
        });

        // 頁面載入時初始化
        (async function init() {
            // 載入分類
            await loadCategories();
            
            // 初始新增一個項目
            addItem();
        })();
        
        // 快捷鍵：Ctrl+S 或 Cmd+S = 儲存
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                document.getElementById('quoteForm').dispatchEvent(new Event('submit'));
            }
        });
        
        // 離開前提醒
        window.addEventListener('beforeunload', (e) => {
            if (formModified) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
    
    <style>
        /* 行動裝置優化 */
        @media (max-width: 768px) {
            .form-row > div {
                grid-template-columns: 1fr !important;
            }
            
            .item-row {
                padding-top: 40px !important;
            }
        }
    </style>
</body>
</html>
