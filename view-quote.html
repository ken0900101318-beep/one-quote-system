<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>檢視報價 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user">
            <button class="btn-secondary" onclick="location.href='dashboard-simple.html'">← 返回列表</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>📄 報價單</h2>
                <button class="btn btn-primary" onclick="window.print()">🖨️ 列印</button>
            </div>

            <!-- Loading 狀態 -->
            <div id="loadingState" style="display: none; text-align: center; padding: 40px;">
                <div class="spinner"></div>
                <p>載入中...</p>
            </div>

            <div id="quoteContent" style="padding: 20px;"></div>
        </div>
    </div>

    <!-- 引入共用工具 -->
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="toast.js"></script>
    <script src="config-api.js"></script>
    <script src="api-quote.js"></script>
    <script>
        // 檢查登入（使用共用工具）
        const currentUser = Auth.requireLogin();
        if (!currentUser) return;

        const statusNames = {
            'quoted': '已報價',
            'signed': '已簽約',
            'construction': '施工中',
            'completed': '已完工'
        };

        // 取得專案 ID
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            Toast.error('缺少專案 ID');
            setTimeout(() => {
                location.href = 'dashboard-simple.html';
            }, 1500);
        }

        // 顯示/隱藏 Loading
        function showLoading(show) {
            document.getElementById('loadingState').style.display = show ? 'block' : 'none';
            document.getElementById('quoteContent').style.display = show ? 'none' : 'block';
        }

        // 載入專案
        async function loadProject() {
            showLoading(true);
            
            try {
                const result = await QuoteAPI.getProject(projectId);
                
                if (result.success) {
                    renderQuote(result.project);
                    Toast.success('已載入報價單');
                } else {
                    Toast.error('載入失敗：' + result.error);
                    setTimeout(() => {
                        location.href = 'dashboard-simple.html';
                    }, 2000);
                }
            } catch (error) {
                console.error('載入失敗:', error);
                Toast.error('連線失敗：' + error.message);
                setTimeout(() => {
                    location.href = 'dashboard-simple.html';
                }, 2000);
            } finally {
                showLoading(false);
            }
        }

        // 顯示報價單（修正 XSS 漏洞）
        function renderQuote(project) {
            const container = document.getElementById('quoteContent');
            
            let itemsHTML = '';
            if (project.items && project.items.length > 0) {
                itemsHTML = `
                    <h3 style="margin-top: 30px;">報價項目</h3>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>項目名稱</th>
                                <th>分類</th>
                                <th>數量</th>
                                <th>單價</th>
                                <th>小計</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${project.items.map(item => {
                                // 組合分類顯示
                                let categoryDisplay = '';
                                if (item.category || item.subCategory) {
                                    const parts = [];
                                    if (item.category) parts.push(Utils.escapeHtml(item.category));
                                    if (item.subCategory) parts.push(Utils.escapeHtml(item.subCategory));
                                    categoryDisplay = parts.join(' / ');
                                }
                                
                                return `
                                    <tr>
                                        <td>
                                            <strong>${Utils.escapeHtml(item.name)}</strong>
                                            ${item.desc ? `<br><small style="color: #666;">${Utils.escapeHtml(item.desc)}</small>` : ''}
                                        </td>
                                        <td>${categoryDisplay || '-'}</td>
                                        <td>${Utils.escapeHtml(item.qty)}</td>
                                        <td>${Utils.formatPrice(item.price)}</td>
                                        <td>${Utils.formatPrice(item.subtotal)}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                `;
            }
            
            container.innerHTML = `
                <div style="border: 2px solid #000; padding: 30px; border-radius: 10px;">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h1 style="margin: 0;">ONE桌遊</h1>
                        <h2 style="margin: 10px 0; color: #666;">報價單</h2>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                        <div>
                            <p><strong>專案編號：</strong>${Utils.escapeHtml(project.projectNumber) || '-'}</p>
                            <p><strong>客戶姓名：</strong>${Utils.escapeHtml(project.customerName) || '-'}</p>
                            <p><strong>聯絡電話：</strong>${Utils.escapeHtml(project.phone) || '-'}</p>
                        </div>
                        <div>
                            <p><strong>狀態：</strong><span class="status-badge status-${Utils.escapeHtml(project.status)}">${Utils.escapeHtml(statusNames[project.status] || project.status)}</span></p>
                            <p><strong>建立日期：</strong>${Utils.formatDate(project.createdAt)}</p>
                            <p><strong>建立人：</strong>${Utils.escapeHtml(project.createdBy) || '-'}</p>
                        </div>
                    </div>
                    
                    ${itemsHTML}
                    
                    <div style="margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 5px; text-align: right;">
                        <h2 style="margin: 0; color: #28a745;">總計：${Utils.formatPrice(project.totalPrice)}</h2>
                    </div>
                </div>
            `;
        }

        // 載入專案
        loadProject();
        
        // 快捷鍵：P = 列印
        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' && !e.ctrlKey && !e.metaKey && !e.target.matches('input, textarea')) {
                e.preventDefault();
                window.print();
            }
        });
    </script>

    <style>
        /* Loading 動畫 */
        .spinner {
            margin: 0 auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media print {
            .navbar, button { display: none !important; }
            .container { padding: 0 !important; }
        }
        
        /* 行動裝置優化 */
        @media (max-width: 768px) {
            #quoteContent > div {
                padding: 15px !important;
            }
            
            #quoteContent > div > div:nth-child(3) {
                grid-template-columns: 1fr !important;
            }
            
            .table {
                font-size: 0.9em;
            }
            
            .table th,
            .table td {
                padding: 8px 4px;
            }
        }
    </style>
</body>
</html>
