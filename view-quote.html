<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>檢視報價 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user">
            <button class="btn-secondary" onclick="location.href='dashboard-simple.html'">← 返回列表</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>📄 專案詳情</h2>
                <div>
                    <button class="btn btn-primary" onclick="editQuote()">✏️ 編輯</button>
                    <button class="btn btn-secondary" onclick="window.print()">🖨️ 列印</button>
                </div>
            </div>

            <div id="loadingState" style="display: none; text-align: center; padding: 40px;">
                <div class="spinner"></div>
                <p>載入中...</p>
            </div>

            <div id="quoteContent" style="padding: 20px;"></div>
        </div>
    </div>

    <script src="utils.js?v=20260320c"></script>
    <script src="auth.js?v=20260320c"></script>
    <script src="toast.js?v=20260320c"></script>
    <script src="config-api.js?v=20260320c"></script>
    <script src="api-quote.js?v=20260320c"></script>
    <script>
        const currentUser = Auth.requireLogin();
        if (!currentUser) {
            throw new Error('未登入');
        }

        const statusNames = {
            quoted: '已報價',
            signed: '已簽約',
            construction: '施工中',
            completed: '已完工'
        };
        const paymentMethods = ['現金', '匯款', '支票', '刷卡', 'LINE Pay', '其他'];

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        let currentProject = null;
        let employees = [];

        if (!projectId) {
            Toast.error('缺少專案 ID');
            setTimeout(() => {
                location.href = 'dashboard-simple.html';
            }, 1500);
        }

        function showLoading(show) {
            document.getElementById('loadingState').style.display = show ? 'block' : 'none';
            document.getElementById('quoteContent').style.display = show ? 'none' : 'block';
        }

        async function initPage() {
            showLoading(true);
            try {
                const [projectResult, usersResult] = await Promise.all([
                    QuoteAPI.getProject(projectId),
                    QuoteAPI.getUsers()
                ]);

                if (!projectResult.success) {
                    throw new Error(projectResult.error || '載入專案失敗');
                }

                currentProject = projectResult.project;
                employees = usersResult.success ? (usersResult.users || []) : [];
                renderQuote(currentProject);
            } catch (error) {
                console.error('初始化失敗:', error);
                Toast.error('載入失敗：' + error.message);
                setTimeout(() => {
                    location.href = 'dashboard-simple.html';
                }, 2000);
            } finally {
                showLoading(false);
            }
        }

        function renderQuote(project) {
            const container = document.getElementById('quoteContent');
            const summary = project.paymentSummary || {};
            const totalPrice = Number(project.totalPrice || 0);
            const totalPaid = Number(summary.totalPaid || 0);
            const pendingAmount = Number(summary.pendingAmount ?? Math.max(totalPrice - totalPaid, 0));
            const progress = Math.max(0, Math.min(100, Number(summary.progressPercent || 0)));

            const itemsHTML = renderItemsTable(project.items || []);
            const paymentsHTML = renderPaymentsTable(project.payments || []);
            const formHTML = renderPaymentForm();

            container.innerHTML = `
                <div class="quote-wrapper">
                    <section class="quote-paper">
                        <div style="text-align: center; margin-bottom: 30px;">
                            <h1 style="margin: 0;">ONE桌遊</h1>
                            <h2 style="margin: 10px 0; color: #666;">專案 / 報價詳情</h2>
                        </div>

                        <div class="info-grid">
                            <div>
                                <p><strong>專案編號：</strong>${Utils.escapeHtml(project.projectNumber) || '-'}</p>
                                <p><strong>客戶姓名：</strong>${Utils.escapeHtml(project.customerName) || '-'}</p>
                                <p><strong>聯絡電話：</strong>${Utils.escapeHtml(project.phone) || '-'}</p>
                            </div>
                            <div>
                                <p><strong>狀態：</strong><span class="status-badge status-${Utils.escapeHtml(project.status)}">${Utils.escapeHtml(statusNames[project.status] || project.status || '-')}</span></p>
                                <p><strong>建立日期：</strong>${Utils.formatDate(project.createdAt)}</p>
                                <p><strong>建立人：</strong>${Utils.escapeHtml(project.createdBy) || '-'}</p>
                            </div>
                        </div>

                        ${itemsHTML}

                        <div class="summary-card total-card">
                            <h2 style="margin: 0; color: #16a34a;">總計：${Utils.formatPrice(totalPrice)}</h2>
                        </div>
                    </section>

                    <section class="payment-section no-print">
                        <div class="section-header">
                            <h3>💰 收款概況</h3>
                        </div>
                        <div class="payment-summary-grid">
                            <div class="summary-card">
                                <div class="summary-label">合約總價</div>
                                <div class="summary-value">${Utils.formatPrice(totalPrice)}</div>
                            </div>
                            <div class="summary-card">
                                <div class="summary-label">已收金額</div>
                                <div class="summary-value success">${Utils.formatPrice(totalPaid)}</div>
                            </div>
                            <div class="summary-card">
                                <div class="summary-label">待收金額</div>
                                <div class="summary-value ${pendingAmount > 0 ? 'danger' : 'success'}">${Utils.formatPrice(pendingAmount)}</div>
                            </div>
                        </div>

                        <div class="payment-progress-panel">
                            <div class="payment-progress-head">
                                <strong>收款進度</strong>
                                <span>${progress.toFixed(0)}%</span>
                            </div>
                            <div class="payment-progress-bar large">
                                <div class="payment-progress-fill" style="width: ${progress}%;"></div>
                            </div>
                        </div>

                        <div class="section-header" style="margin-top: 28px;">
                            <h3>🧾 收款歷史</h3>
                            <span class="history-count">共 ${project.payments?.length || 0} 筆</span>
                        </div>
                        ${paymentsHTML}

                        <div class="section-header" style="margin-top: 28px;">
                            <h3>➕ 新增收款記錄</h3>
                        </div>
                        ${formHTML}
                    </section>
                </div>
            `;

            bindPaymentForm();
        }

        function renderItemsTable(items) {
            if (!items || items.length === 0) {
                return '<h3 style="margin-top: 30px;">報價項目</h3><div class="empty-box">尚未建立報價項目</div>';
            }

            return `
                <h3 style="margin-top: 30px;">報價項目</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>項目名稱</th>
                            <th>分類</th>
                            <th>數量</th>
                            <th>單價</th>
                            <th>小計</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map(item => {
                            const parts = [];
                            if (item.category) parts.push(Utils.escapeHtml(item.category));
                            if (item.subCategory) parts.push(Utils.escapeHtml(item.subCategory));
                            const categoryDisplay = parts.length ? parts.join(' / ') : '-';
                            return `
                                <tr>
                                    <td>
                                        <strong>${Utils.escapeHtml(item.name || '')}</strong>
                                        ${item.desc ? `<br><small style="color: #666;">${Utils.escapeHtml(item.desc)}</small>` : ''}
                                    </td>
                                    <td>${categoryDisplay}</td>
                                    <td>${Utils.escapeHtml(item.qty || 0)} ${item.unit ? Utils.escapeHtml(item.unit) : ''}</td>
                                    <td>${Utils.formatPrice(item.price)}</td>
                                    <td>${Utils.formatPrice(item.subtotal)}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderPaymentsTable(payments) {
            if (!payments || payments.length === 0) {
                return '<div class="empty-box">目前還沒有收款記錄</div>';
            }

            return `
                <div class="table-wrap">
                    <table class="table payment-table">
                        <thead>
                            <tr>
                                <th>收款日期</th>
                                <th>金額</th>
                                <th>方式</th>
                                <th>收款人</th>
                                <th>備註</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${payments.map(payment => `
                                <tr>
                                    <td>${Utils.escapeHtml(payment.paymentDate) || '-'}</td>
                                    <td><strong>${Utils.formatPrice(payment.amount)}</strong></td>
                                    <td>${Utils.escapeHtml(payment.method) || '-'}</td>
                                    <td>${Utils.escapeHtml(payment.receiverName) || '-'}</td>
                                    <td>${Utils.escapeHtml(payment.note) || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderPaymentForm() {
            const today = new Date().toISOString().slice(0, 10);
            const employeeOptions = employees.map(user =>
                `<option value="${Utils.escapeHtml(user.id)}">${Utils.escapeHtml((user.avatar || '') + ' ' + (user.name || ''))}</option>`
            ).join('');
            const methodOptions = paymentMethods.map(method =>
                `<option value="${Utils.escapeHtml(method)}">${Utils.escapeHtml(method)}</option>`
            ).join('');

            return `
                <form id="paymentForm" class="payment-form">
                    <div class="form-grid">
                        <div class="form-row">
                            <label for="paymentDate">收款日期 *</label>
                            <input type="date" id="paymentDate" required value="${today}" max="9999-12-31">
                        </div>
                        <div class="form-row">
                            <label for="paymentAmount">金額 *</label>
                            <input type="number" id="paymentAmount" required min="1" step="1" placeholder="請輸入收款金額">
                        </div>
                        <div class="form-row">
                            <label for="paymentMethod">方式 *</label>
                            <select id="paymentMethod" required>
                                <option value="">請選擇</option>
                                ${methodOptions}
                            </select>
                        </div>
                        <div class="form-row">
                            <label for="paymentReceiver">收款人 *</label>
                            <select id="paymentReceiver" required>
                                <option value="">請選擇</option>
                                ${employeeOptions}
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <label for="paymentNote">備註</label>
                        <textarea id="paymentNote" rows="3" maxlength="500" placeholder="可填寫匯款後五碼、對帳資訊等"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="paymentSubmitBtn">💾 新增收款</button>
                    </div>
                </form>
            `;
        }

        function bindPaymentForm() {
            const form = document.getElementById('paymentForm');
            if (!form) return;

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                const paymentDate = document.getElementById('paymentDate').value;
                const amount = Number(document.getElementById('paymentAmount').value);
                const method = document.getElementById('paymentMethod').value;
                const receiverId = document.getElementById('paymentReceiver').value;
                const note = document.getElementById('paymentNote').value.trim();

                if (!paymentDate) {
                    Toast.error('請選擇收款日期');
                    document.getElementById('paymentDate').focus();
                    return;
                }
                if (!Utils.validateNumber(amount, 1, 999999999)) {
                    Toast.error('金額需為大於 0 的數字');
                    document.getElementById('paymentAmount').focus();
                    return;
                }
                if (!method) {
                    Toast.error('請選擇收款方式');
                    document.getElementById('paymentMethod').focus();
                    return;
                }
                if (!receiverId) {
                    Toast.error('請選擇收款人');
                    document.getElementById('paymentReceiver').focus();
                    return;
                }
                if (note.length > 500) {
                    Toast.error('備註不可超過 500 字');
                    document.getElementById('paymentNote').focus();
                    return;
                }

                const submitBtn = document.getElementById('paymentSubmitBtn');
                submitBtn.disabled = true;
                submitBtn.textContent = '儲存中...';

                try {
                    const result = await QuoteAPI.addPayment({
                        projectId: currentProject.id,
                        paymentDate,
                        amount,
                        method,
                        receiverId,
                        note
                    });

                    if (!result.success) {
                        throw new Error(result.error || '新增失敗');
                    }

                    Toast.success('收款記錄已新增');
                    await refreshProject();
                } catch (error) {
                    console.error('新增收款失敗:', error);
                    Toast.error('新增失敗：' + error.message);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '💾 新增收款';
                }
            });
        }

        async function refreshProject() {
            const result = await QuoteAPI.getProject(projectId);
            if (!result.success) {
                throw new Error(result.error || '重新載入失敗');
            }
            currentProject = result.project;
            renderQuote(currentProject);
        }

        function editQuote() {
            location.href = `edit-quote.html?id=${encodeURIComponent(projectId)}`;
        }

        initPage();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' && !e.ctrlKey && !e.metaKey && !e.target.matches('input, textarea, select')) {
                e.preventDefault();
                window.print();
            }
            if (e.key === 'e' && !e.ctrlKey && !e.metaKey && !e.target.matches('input, textarea, select')) {
                e.preventDefault();
                editQuote();
            }
        });
    </script>

    <style>
        .spinner {
            margin: 0 auto;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .quote-wrapper {
            display: grid;
            gap: 24px;
        }

        .quote-paper {
            border: 2px solid #000;
            padding: 30px;
            border-radius: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .payment-section {
            border-top: 1px solid #e5e7eb;
            padding-top: 10px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .payment-summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 12px;
        }

        .summary-card {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
        }

        .total-card {
            margin-top: 30px;
            text-align: right;
        }

        .summary-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
        }

        .summary-value.success { color: #16a34a; }
        .summary-value.danger { color: #dc2626; }

        .payment-progress-panel {
            margin-top: 18px;
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
        }

        .payment-progress-head {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .payment-progress-bar {
            width: 100%;
            height: 10px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
        }

        .payment-progress-bar.large {
            height: 14px;
        }

        .payment-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #10b981 100%);
            border-radius: 999px;
        }

        .empty-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 10px;
            padding: 18px;
            color: #64748b;
        }

        .history-count {
            color: #64748b;
            font-size: 14px;
        }

        .table-wrap {
            overflow-x: auto;
        }

        .payment-form {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 18px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .form-row input,
        .form-row select,
        .form-row textarea {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .form-row textarea {
            resize: vertical;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
        }

        @media print {
            .navbar, button, .no-print { display: none !important; }
            .container { padding: 0 !important; }
        }

        @media (max-width: 768px) {
            .quote-paper {
                padding: 15px;
            }

            .info-grid,
            .payment-summary-grid,
            .form-grid {
                grid-template-columns: 1fr;
            }

            .summary-value {
                font-size: 22px;
            }
        }
    </style>
</body>
</html>
