<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯報價 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user">
            <button class="btn-secondary" onclick="goBack()">← 返回</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>✏️ 編輯報價</h2>
            </div>

            <form id="quoteForm" style="padding: 20px;">
                <h3>基本資訊</h3>
                <div class="form-row">
                    <label>客戶姓名 *</label>
                    <input type="text" id="customerName" required maxlength="50" placeholder="請輸入客戶姓名">
                </div>
                <div class="form-row">
                    <label>聯絡電話 *</label>
                    <input type="tel" id="phone" required pattern="09\d{8}" placeholder="0912345678">
                    <small style="color: #666;">格式：09 開頭，共 10 位數字</small>
                </div>
                <div class="form-row">
                    <label>專案編號</label>
                    <input type="text" id="projectNumber" readonly class="readonly-input">
                </div>
                <div class="form-row">
                    <label>狀態</label>
                    <select id="status">
                        <option value="quoted">已報價</option>
                        <option value="signed">已簽約</option>
                        <option value="construction">施工中</option>
                        <option value="completed">已完工</option>
                        <option value="paid">已付款</option>
                    </select>
                </div>
                <div class="form-row contractor-panel">
                    <label>指定工程行</label>
                    <select id="contractorId" onchange="handleContractorChange()">
                        <option value="">未指定</option>
                    </select>
                    <div id="contractorInfo" class="contractor-info" style="display:none;"></div>
                </div>

                <h3 style="margin-top: 30px;">報價項目</h3>
                <div id="itemsContainer"></div>
                <button type="button" class="btn btn-secondary" onclick="addItem()">➕ 新增項目</button>

                <div style="margin-top: 30px; padding: 15px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <h3>總計：$<span id="totalPrice">0</span></h3>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn">💾 儲存修改</button>
                    <button type="button" class="btn btn-secondary" onclick="goBack()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="utils.js?v=20260320f"></script>
    <script src="auth.js?v=20260320f"></script>
    <script src="toast.js?v=20260320f"></script>
    <script src="config-api.js?v=20260320f"></script>
    <script src="api-quote.js?v=20260320f"></script>
    <script src="price-list-picker.js?v=20260320f"></script>
    <script>
        const currentUser = Auth.requireLogin();
        let itemCount = 0;
        let items = [];
        let formModified = false;
        let priceTable = [];
        let contractorOptions = [];
        let projectId = new URLSearchParams(window.location.search).get('id');
        let originalData = null;

        if (!currentUser) {
            console.warn('未登入或登入資訊失效，停止載入 edit-quote');
        } else if (!projectId) {
            Toast.error('缺少專案 ID');
            setTimeout(() => location.href = 'dashboard-simple.html', 800);
        } else {
            document.getElementById('quoteForm').addEventListener('input', () => {
                formModified = true;
            });

            async function loadPriceTable() {
                const result = await QuoteAPI.getPriceTable();
                if (!result.success) {
                    priceTable = [];
                    Toast.error('價目表載入失敗：' + (result.error || '未知錯誤'));
                    return;
                }
                priceTable = result.items || [];
                PriceListPicker.setItems(priceTable);
            }

            async function loadContractors() {
                const result = await QuoteAPI.getContractors({ status: 'active' });
                if (!result.success) {
                    contractorOptions = [];
                    renderContractorOptions();
                    Toast.error('工程行載入失敗：' + (result.error || '未知錯誤'));
                    return;
                }
                contractorOptions = result.contractors || [];
                renderContractorOptions();
            }

            function renderContractorOptions(selectedId = '') {
                const select = document.getElementById('contractorId');
                select.innerHTML = '<option value="">未指定</option>' + contractorOptions.map(item => `
                    <option value="${Utils.escapeHtml(item.id)}" ${String(selectedId) === String(item.id) ? 'selected' : ''}>${Utils.escapeHtml(item.companyName)}｜${Utils.escapeHtml(item.contactName || '')}</option>
                `).join('');
                updateContractorInfo(select.value);
            }

            function updateContractorInfo(contractorId) {
                const info = document.getElementById('contractorInfo');
                const contractor = contractorOptions.find(item => String(item.id) === String(contractorId));
                if (!contractor) {
                    info.style.display = 'none';
                    info.innerHTML = '';
                    return;
                }
                info.style.display = 'block';
                info.innerHTML = `
                    <div><strong>${Utils.escapeHtml(contractor.companyName || '')}</strong>（${Utils.escapeHtml(contractor.contactName || '-')}）</div>
                    <div class="contractor-contact-row">
                        <a href="tel:${encodeURIComponent(contractor.phone || '')}">📞 ${Utils.escapeHtml(contractor.phone || '-')}</a>
                        ${contractor.lineUrl ? `<a href="${Utils.escapeHtml(contractor.lineUrl)}" target="_blank" rel="noopener">LINE 聯絡</a>` : ''}
                        ${contractor.email ? `<span>✉️ ${Utils.escapeHtml(contractor.email)}</span>` : ''}
                    </div>
                `;
            }

            function handleContractorChange() {
                updateContractorInfo(document.getElementById('contractorId').value);
            }

            function addItem(data = {}) {
                itemCount += 1;
                const id = itemCount;
                items.push(id);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item-row';
                itemDiv.id = `item${id}`;
                itemDiv.innerHTML = `
                    <button type="button" onclick="removeItem(${id})" class="danger-chip">✕</button>
                    <div class="form-row">
                        <label>項目名稱 *</label>
                        <div class="field-inline">
                            <input type="text" id="itemName${id}" required maxlength="100" value="${Utils.escapeHtml(data.name || '')}" style="flex: 1;">
                            <button type="button" class="btn btn-sm btn-secondary" onclick="selectFromPriceTable(${id})">📋 從價目表選擇</button>
                        </div>
                    </div>
                    <div class="form-grid-2">
                        <div class="form-row">
                            <label>分類</label>
                            <input type="text" id="itemCategory${id}" maxlength="20" value="${Utils.escapeHtml(data.category || '')}" list="priceCategoryList">
                        </div>
                        <div class="form-row">
                            <label>規格 / 說明</label>
                            <input type="text" id="itemDesc${id}" maxlength="200" value="${Utils.escapeHtml(data.desc || data.spec || '')}">
                        </div>
                    </div>
                    <div class="form-grid-4">
                        <div class="form-row">
                            <label>數量 *</label>
                            <input type="number" id="itemQty${id}" value="${Number(data.qty || 1)}" min="1" max="9999" step="1" required onchange="calculateTotal()">
                        </div>
                        <div class="form-row">
                            <label>單價 *</label>
                            <input type="number" id="itemPrice${id}" value="${Number(data.price || 0)}" min="0" max="9999999" step="0.01" required onchange="calculateTotal()">
                        </div>
                        <div class="form-row">
                            <label>單位</label>
                            <input type="text" id="itemUnit${id}" maxlength="20" value="${Utils.escapeHtml(data.unit || '')}" placeholder="個 / 組 / 式">
                        </div>
                        <div class="form-row">
                            <label>小計</label>
                            <input type="text" id="itemSubtotal${id}" readonly class="readonly-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <label>備註</label>
                        <input type="text" id="itemNote${id}" maxlength="200" value="${Utils.escapeHtml(data.note || '')}" placeholder="例如：安裝位置、客製需求">
                    </div>
                `;
                document.getElementById('itemsContainer').appendChild(itemDiv);
                calculateTotal();
            }

            function removeItem(id) {
                const name = (document.getElementById(`itemName${id}`)?.value || '').trim();
                if (name && !confirm(`確定要移除項目「${name}」嗎？`)) return;
                document.getElementById(`item${id}`)?.remove();
                items = items.filter(itemId => itemId !== id);
                calculateTotal();
            }

            function selectFromPriceTable(itemId) {
                if (!priceTable.length) {
                    Toast.error('價目表尚未載入');
                    return;
                }
                const defaultCategory = (document.getElementById(`itemCategory${itemId}`)?.value || '').trim();
                PriceListPicker.open(itemId, {
                    defaultCategory,
                    onSelect: fillPriceItem
                });
            }

            function fillPriceItem(priceItem, itemId) {
                document.getElementById(`itemName${itemId}`).value = priceItem.name || '';
                document.getElementById(`itemCategory${itemId}`).value = priceItem.category || '';
                document.getElementById(`itemDesc${itemId}`).value = priceItem.spec || priceItem.description || '';
                document.getElementById(`itemPrice${itemId}`).value = Number(priceItem.price || 0);
                document.getElementById(`itemUnit${itemId}`).value = priceItem.unit || '';
                document.getElementById(`itemNote${itemId}`).value = priceItem.note || priceItem.remark || '';
                const qtyInput = document.getElementById(`itemQty${itemId}`);
                if (qtyInput && (!qtyInput.value || Number(qtyInput.value) < 1)) qtyInput.value = 1;
                calculateTotal();
                Toast.success('已帶入價目表項目，可再調整數量');
            }

            function calculateTotal() {
                let total = 0;
                items.forEach(id => {
                    const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                    const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                    const subtotal = qty * price;
                    const subtotalInput = document.getElementById(`itemSubtotal${id}`);
                    if (subtotalInput) subtotalInput.value = Utils.formatPrice(subtotal);
                    total += subtotal;
                });
                document.getElementById('totalPrice').textContent = total.toLocaleString();
            }

            function collectItems() {
                const result = [];
                items.forEach(id => {
                    const name = (document.getElementById(`itemName${id}`)?.value || '').trim();
                    const category = (document.getElementById(`itemCategory${id}`)?.value || '').trim();
                    const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                    const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                    const unit = (document.getElementById(`itemUnit${id}`)?.value || '').trim();
                    const desc = (document.getElementById(`itemDesc${id}`)?.value || '').trim();
                    const note = (document.getElementById(`itemNote${id}`)?.value || '').trim();
                    if (!name) return;
                    result.push({ name, category, qty, price, unit, desc, spec: desc, note, remark: note, subtotal: qty * price });
                });
                return result;
            }

            function validateForm() {
                const customerName = document.getElementById('customerName').value.trim();
                const phone = document.getElementById('phone').value.trim();
                if (!customerName || customerName.length < 2) {
                    Toast.error('請輸入客戶姓名（至少 2 個字）');
                    document.getElementById('customerName').focus();
                    return false;
                }
                if (!Utils.validatePhone(phone)) {
                    Toast.error('請輸入正確的手機號碼（例如：0912345678）');
                    document.getElementById('phone').focus();
                    return false;
                }
                const quoteItems = collectItems();
                if (!quoteItems.length) {
                    Toast.error('請至少保留一個報價項目');
                    return false;
                }
                for (const item of quoteItems) {
                    if (!Utils.validateNumber(item.qty, 1, 9999)) {
                        Toast.error(`項目「${item.name}」的數量必須在 1-9999 之間`);
                        return false;
                    }
                    if (!Utils.validateNumber(item.price, 0, 9999999)) {
                        Toast.error(`項目「${item.name}」的單價必須在 0-9,999,999 之間`);
                        return false;
                    }
                }
                return true;
            }

            async function loadProject() {
                Toast.info('載入資料中...');
                const result = await QuoteAPI.getProject(projectId);
                if (!result.success) {
                    Toast.error('載入失敗：' + (result.error || '未知錯誤'));
                    setTimeout(() => location.href = 'dashboard-simple.html', 1000);
                    return;
                }
                originalData = result.project;
                document.getElementById('customerName').value = result.project.customerName || '';
                document.getElementById('phone').value = result.project.phone === '-' ? '' : (result.project.phone || '');
                document.getElementById('projectNumber').value = result.project.projectNumber || '';
                document.getElementById('status').value = result.project.status || 'quoted';
                renderContractorOptions(result.project.contractorId || '');

                const initialItems = Array.isArray(result.project.items) && result.project.items.length
                    ? result.project.items
                    : [{ name: '舊資料匯入項目', qty: 1, price: Number(result.project.totalPrice || 0), unit: '式', desc: '系統自動補入，請依實際內容調整' }];
                initialItems.forEach(addItem);
                calculateTotal();
                Toast.success('資料已載入');
            }

            function goBack() {
                if (formModified && !confirm('⚠️ 表單尚未儲存，確定要離開嗎？')) return;
                location.href = 'dashboard-simple.html';
            }

            document.getElementById('quoteForm').addEventListener('submit', async (event) => {
                event.preventDefault();
                if (!validateForm()) return;

                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.textContent = '儲存中...';

                const quoteItems = collectItems();
                const totalPrice = quoteItems.reduce((sum, item) => sum + Number(item.subtotal || 0), 0);
                const selectedContractor = contractorOptions.find(item => String(item.id) === String(document.getElementById('contractorId').value));
                const payload = {
                    ...originalData,
                    projectNumber: document.getElementById('projectNumber').value,
                    customerName: document.getElementById('customerName').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    status: document.getElementById('status').value,
                    contractorId: selectedContractor ? selectedContractor.id : '',
                    contractorName: selectedContractor ? selectedContractor.companyName : '',
                    contractorPhone: selectedContractor ? selectedContractor.phone : '',
                    contractorLineUrl: selectedContractor ? selectedContractor.lineUrl : '',
                    contractorContactName: selectedContractor ? selectedContractor.contactName : '',
                    items: quoteItems,
                    totalPrice
                };

                const result = await QuoteAPI.updateProject(projectId, payload);
                if (result.success) {
                    formModified = false;
                    Toast.success('修改已成功儲存！');
                    setTimeout(() => location.href = 'dashboard-simple.html', 800);
                    return;
                }

                submitBtn.disabled = false;
                submitBtn.textContent = '💾 儲存修改';
                Toast.error('儲存失敗：' + (result.error || '未知錯誤'));
            });

            document.addEventListener('keydown', (event) => {
                if ((event.ctrlKey || event.metaKey) && event.key === 's') {
                    event.preventDefault();
                    document.getElementById('quoteForm').dispatchEvent(new Event('submit'));
                }
            });

            window.addEventListener('beforeunload', (event) => {
                if (!formModified) return;
                event.preventDefault();
                event.returnValue = '';
            });

            window.goBack = goBack;
            window.addItem = addItem;
            window.removeItem = removeItem;
            window.selectFromPriceTable = selectFromPriceTable;
            window.handleContractorChange = handleContractorChange;

            (async function init() {
                await Promise.all([loadPriceTable(), loadContractors()]);
                await loadProject();
            })();
        }
    </script>

    <datalist id="priceCategoryList">
        <option value="麻將桌"></option>
        <option value="冷氣"></option>
        <option value="水電配線"></option>
        <option value="輕隔間"></option>
        <option value="包廂門"></option>
        <option value="智能門鎖"></option>
        <option value="其他設備"></option>
    </datalist>

    <style>
        .item-row { position: relative; border: 1px solid #dbe2ea; border-radius: 10px; padding: 18px; margin-bottom: 14px; background: #fff; }
        .field-inline { display: flex; gap: 10px; }
        .form-grid-2, .form-grid-4 { display: grid; gap: 12px; }
        .form-grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .form-grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .readonly-input { background: #f8fafc; }
        .contractor-panel { padding: 14px; border: 1px solid #dbe2ea; border-radius: 10px; background: #f8fafc; margin-top: 12px; }
        .contractor-info { margin-top: 10px; padding: 12px; border-radius: 10px; background: #fff; border: 1px dashed #cbd5e1; color: #334155; }
        .contractor-contact-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
        .danger-chip { position: absolute; top: 12px; right: 12px; border: none; background: #ef4444; color: #fff; border-radius: 999px; width: 32px; height: 32px; cursor: pointer; }
        @media (max-width: 768px) {
            .field-inline, .form-grid-2, .form-grid-4 { grid-template-columns: 1fr; display: grid; }
            .item-row { padding-top: 52px; }
        }
    </style>
</body>
</html>
