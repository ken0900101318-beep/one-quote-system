<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯報價 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user">
            <button class="btn-secondary" onclick="goBack()">← 返回</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>✏️ 編輯報價</h2>
            </div>

            <form id="quoteForm" style="padding: 20px;">
                <h3>基本資訊</h3>
                <div class="form-row">
                    <label>客戶姓名 *</label>
                    <input type="text" id="customerName" required maxlength="50" placeholder="請輸入客戶姓名">
                </div>
                <div class="form-row">
                    <label>聯絡電話 *</label>
                    <input type="tel" id="phone" required pattern="09\d{8}" placeholder="0912345678">
                    <small style="color: #666;">格式：09 開頭，共 10 位數字</small>
                </div>
                <div class="form-row">
                    <label>專案編號</label>
                    <input type="text" id="projectNumber" readonly style="background: #f0f0f0;">
                </div>
                <div class="form-row">
                    <label>狀態</label>
                    <select id="status">
                        <option value="quoted">已報價</option>
                        <option value="signed">已簽約</option>
                        <option value="construction">施工中</option>
                        <option value="completed">已完工</option>
                    </select>
                </div>

                <h3 style="margin-top: 30px;">報價項目</h3>
                <div id="itemsContainer"></div>
                <button type="button" class="btn btn-secondary" onclick="addItem()">➕ 新增項目</button>

                <div style="margin-top: 30px; padding: 15px; background: #f0f0f0; border-radius: 5px;">
                    <h3>總計：$<span id="totalPrice">0</span></h3>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn">💾 儲存修改</button>
                    <button type="button" class="btn btn-secondary" onclick="goBack()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 引入共用工具 -->
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="toast.js"></script>
    <script src="config-api.js"></script>
    <script src="api-quote.js"></script>
    <script>
        // 檢查登入
        const currentUser = Auth.requireLogin();
        if (!currentUser) return;

        let itemCount = 0;
        let items = [];
        let formModified = false;
        let categories = [];
        let priceTable = [];
        let projectId = null;
        let originalData = null;

        // 從 URL 取得專案 ID
        const urlParams = new URLSearchParams(window.location.search);
        projectId = urlParams.get('id');

        if (!projectId) {
            Toast.error('缺少專案 ID');
            setTimeout(() => location.href = 'dashboard-simple.html', 1000);
        }

        // 監控表單變更
        document.getElementById('quoteForm').addEventListener('input', () => {
            formModified = true;
        });

        // 載入分類
        async function loadCategories() {
            try {
                const result = await QuoteAPI.getCategories();
                if (result.success && result.categories) {
                    categories = result.categories;
                    console.log('已載入分類:', categories.length, '個');
                } else {
                    console.warn('無法載入分類:', result.error || '未知錯誤');
                    categories = [];
                }
            } catch (error) {
                console.error('載入分類失敗:', error);
                categories = [];
            }
        }
        
        // 載入價目表
        async function loadPriceTable() {
            try {
                const result = await QuoteAPI.getPriceTable();
                if (result.success && result.items) {
                    priceTable = result.items;
                    console.log('已載入價目表:', priceTable.length, '項');
                } else {
                    console.warn('無法載入價目表:', result.error || '未知錯誤');
                    priceTable = [];
                }
            } catch (error) {
                console.error('載入價目表失敗:', error);
                priceTable = [];
            }
        }

        // 填充分類選單
        function populateCategorySelect(selectElement) {
            selectElement.innerHTML = '<option value="">請選擇分類</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.name;
                option.textContent = cat.name;
                selectElement.appendChild(option);
            });
        }

        // 載入專案資料
        async function loadProject() {
            try {
                Toast.info('載入資料中...');
                const result = await QuoteAPI.getProject(projectId);
                
                if (!result.success) {
                    Toast.error('載入失敗：' + result.error);
                    setTimeout(() => location.href = 'dashboard-simple.html', 1500);
                    return;
                }

                const project = result.project;
                originalData = project;

                // 填入基本資訊
                document.getElementById('customerName').value = project.customerName || '';
                document.getElementById('phone').value = project.phone || '';
                document.getElementById('projectNumber').value = project.projectNumber || '';
                document.getElementById('status').value = project.status || 'quoted';

                // 載入項目
                if (project.items && project.items.length > 0) {
                    project.items.forEach(item => {
                        addItem(item);
                    });
                } else {
                    // 如果沒有項目，新增一個空項目
                    addItem();
                }

                calculateTotal();
                Toast.success('資料已載入');
            } catch (error) {
                console.error('載入專案失敗:', error);
                Toast.error('載入失敗：' + error.message);
                setTimeout(() => location.href = 'dashboard-simple.html', 1500);
            }
        }

        // 返回前確認
        function goBack() {
            if (formModified && !confirm('⚠️ 表單尚未儲存，確定要離開嗎？')) {
                return;
            }
            location.href = 'dashboard-simple.html';
        }

        // 新增項目（支援預填資料）
        function addItem(data = null) {
            itemCount++;
            const container = document.getElementById('itemsContainer');
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item-row';
            itemDiv.id = `item${itemCount}`;
            itemDiv.style.cssText = 'border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; position: relative;';
            
            itemDiv.innerHTML = `
                <button type="button" onclick="removeItem(${itemCount})" 
                        style="position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">
                    ✕
                </button>
                <div class="form-row">
                    <label>項目名稱 *</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="itemName${itemCount}" required maxlength="100" value="${data?.name || ''}" style="flex: 1;">
                        <button type="button" class="btn btn-sm btn-secondary" onclick="selectFromPriceTable(${itemCount})">
                            📋 從價目表選擇
                        </button>
                    </div>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>分類</label>
                        <select id="itemCategory${itemCount}">
                            <option value="">請選擇分類</option>
                        </select>
                    </div>
                    <div>
                        <label>子分類</label>
                        <input type="text" id="itemSubCategory${itemCount}" maxlength="50" placeholder="選填" value="${data?.subCategory || ''}">
                    </div>
                </div>
                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px;">
                    <div>
                        <label>數量 *</label>
                        <input type="number" id="itemQty${itemCount}" value="${data?.qty || 1}" min="1" max="9999" required onchange="calculateTotal()">
                    </div>
                    <div>
                        <label>單價 *</label>
                        <input type="number" id="itemPrice${itemCount}" value="${data?.price || 0}" min="0" max="9999999" step="0.01" required onchange="calculateTotal()">
                    </div>
                    <div>
                        <label>單位</label>
                        <input type="text" id="itemUnit${itemCount}" maxlength="10" placeholder="個/組/式" value="${data?.unit || ''}">
                    </div>
                    <div>
                        <label>小計</label>
                        <input type="text" id="itemSubtotal${itemCount}" readonly style="background: #f0f0f0;">
                    </div>
                </div>
                <div class="form-row">
                    <label>說明</label>
                    <input type="text" id="itemDesc${itemCount}" maxlength="200" value="${data?.desc || ''}">
                </div>
            `;
            
            container.appendChild(itemDiv);
            items.push(itemCount);
            
            // 填充分類選單
            const categorySelect = document.getElementById(`itemCategory${itemCount}`);
            if (categorySelect) {
                populateCategorySelect(categorySelect);
                if (data?.category) {
                    categorySelect.value = data.category;
                }
            }
            
            calculateTotal();
        }

        // 移除項目
        function removeItem(id) {
            const itemName = document.getElementById(`itemName${id}`)?.value;
            
            if (itemName && !confirm(`確定要移除項目「${itemName}」嗎？`)) {
                return;
            }
            
            const itemDiv = document.getElementById(`item${id}`);
            if (itemDiv) {
                itemDiv.remove();
                items = items.filter(i => i !== id);
                calculateTotal();
            }
        }

        // 計算總計
        function calculateTotal() {
            let total = 0;
            
            items.forEach(id => {
                const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                const subtotal = qty * price;
                
                const subtotalInput = document.getElementById(`itemSubtotal${id}`);
                if (subtotalInput) {
                    subtotalInput.value = Utils.formatPrice(subtotal);
                }
                
                total += subtotal;
            });
            
            document.getElementById('totalPrice').textContent = total.toLocaleString();
        }

        // 表單驗證
        function validateForm() {
            const customerName = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!customerName || customerName.length < 2) {
                Toast.error('請輸入客戶姓名（至少 2 個字）');
                document.getElementById('customerName').focus();
                return false;
            }
            
            if (customerName.length > 50) {
                Toast.error('客戶姓名不可超過 50 個字');
                document.getElementById('customerName').focus();
                return false;
            }
            
            if (!Utils.validatePhone(phone)) {
                Toast.error('請輸入正確的手機號碼（例如：0912345678）');
                document.getElementById('phone').focus();
                return false;
            }
            
            let hasValidItem = false;
            for (const id of items) {
                const name = document.getElementById(`itemName${id}`)?.value.trim();
                const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                
                if (name && qty > 0) {
                    hasValidItem = true;
                    
                    if (!Utils.validateNumber(qty, 1, 9999)) {
                        Toast.error(`項目「${name}」的數量必須在 1-9999 之間`);
                        return false;
                    }
                    
                    if (!Utils.validateNumber(price, 0, 9999999)) {
                        Toast.error(`項目「${name}」的單價必須在 0-9,999,999 之間`);
                        return false;
                    }
                }
            }
            
            if (!hasValidItem) {
                Toast.error('請至少保留一個報價項目');
                return false;
            }
            
            return true;
        }

        // 儲存修改
        document.getElementById('quoteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '儲存中...';
            
            // 收集資料
            const projectData = {
                ...originalData,
                projectNumber: document.getElementById('projectNumber').value,
                customerName: document.getElementById('customerName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                status: document.getElementById('status').value,
                items: [],
                totalPrice: 0
            };
            
            // 收集項目
            let total = 0;
            items.forEach(id => {
                const name = document.getElementById(`itemName${id}`)?.value.trim() || '';
                const category = document.getElementById(`itemCategory${id}`)?.value.trim() || '';
                const subCategory = document.getElementById(`itemSubCategory${id}`)?.value.trim() || '';
                const qty = parseFloat(document.getElementById(`itemQty${id}`)?.value || 0);
                const price = parseFloat(document.getElementById(`itemPrice${id}`)?.value || 0);
                const unit = document.getElementById(`itemUnit${id}`)?.value.trim() || '';
                const desc = document.getElementById(`itemDesc${id}`)?.value.trim() || '';
                
                if (name && qty > 0) {
                    const subtotal = qty * price;
                    projectData.items.push({
                        name, 
                        category, 
                        subCategory, 
                        qty, 
                        price, 
                        unit,
                        desc, 
                        subtotal
                    });
                    total += subtotal;
                }
            });
            
            projectData.totalPrice = total;
            
            try {
                console.log('準備更新:', projectData);
                const result = await QuoteAPI.updateProject(projectId, projectData);
                
                if (result.success) {
                    Toast.success('修改已成功儲存！');
                    formModified = false;
                    setTimeout(() => {
                        location.href = 'dashboard-simple.html';
                    }, 1000);
                } else {
                    Toast.error('儲存失敗：' + result.error);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '💾 儲存修改';
                }
            } catch (error) {
                console.error('儲存失敗:', error);
                Toast.error('連線失敗：' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 儲存修改';
            }
        });

        // 從價目表選擇
        function selectFromPriceTable(itemId) {
            if (priceTable.length === 0) {
                Toast.error('價目表尚未載入或為空');
                return;
            }
            
            const keyword = prompt('請輸入項目關鍵字搜尋：');
            if (!keyword) return;
            
            const filtered = priceTable.filter(item => 
                item.name.includes(keyword)
            );
            
            if (filtered.length === 0) {
                Toast.error('找不到相關項目');
                return;
            }
            
            if (filtered.length === 1) {
                fillPriceItem(itemId, filtered[0]);
                return;
            }
            
            const options = filtered.map((item, idx) => 
                `${idx + 1}. ${item.name} - ${item.price} 元/${item.unit || '個'}`
            ).join('\n');
            
            const choice = prompt(`找到 ${filtered.length} 項結果：\n${options}\n\n請輸入編號：`);
            const index = parseInt(choice) - 1;
            
            if (index >= 0 && index < filtered.length) {
                fillPriceItem(itemId, filtered[index]);
            } else {
                Toast.error('無效的選擇');
            }
        }
        
        // 填入價目資料
        function fillPriceItem(itemId, priceItem) {
            document.getElementById(`itemName${itemId}`).value = priceItem.name || '';
            
            const categorySelect = document.getElementById(`itemCategory${itemId}`);
            if (categorySelect && priceItem.category) {
                categorySelect.value = priceItem.category;
            }
            
            document.getElementById(`itemSubCategory${itemId}`).value = priceItem.subCategory || '';
            document.getElementById(`itemPrice${itemId}`).value = priceItem.price || 0;
            document.getElementById(`itemUnit${itemId}`).value = priceItem.unit || '';
            
            calculateTotal();
            Toast.success('已填入價目資料');
        }
        
        // 頁面載入時初始化
        (async function init() {
            await loadCategories();
            await loadPriceTable();
            await loadProject();
        })();
        
        // 快捷鍵
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                document.getElementById('quoteForm').dispatchEvent(new Event('submit'));
            }
        });
        
        // 離開前提醒
        window.addEventListener('beforeunload', (e) => {
            if (formModified) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
    
    <style>
        @media (max-width: 768px) {
            .form-row > div {
                grid-template-columns: 1fr !important;
            }
            
            .item-row {
                padding-top: 40px !important;
            }
        }
    </style>
</body>
</html>
