<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE桌遊報價管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea, #764ba2);">
        <div style="text-align: center; color: white;">
            <h1 style="font-size: 2em; margin-bottom: 20px;">🔄 正在跳轉...</h1>
            <p>請稍候</p>
        </div>
    </div>

    <script>
        // 檢查是否已在員工管理系統登入
        const currentUser = JSON.parse(localStorage.getItem('oneCurrentUser'));
        
        if (currentUser) {
            // 已登入，直接進入報價系統
            window.location.href = 'dashboard-simple.html';
        } else {
            // 未登入，跳轉到員工管理系統登入
            alert('請先在員工管理系統登入');
            window.location.href = '../one-management-portal/index.html';
        }
    </script>
</body>
</html>
