<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程行詳情 - ONE桌遊報價系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" class="logo">
            ONE桌遊報價系統
        </div>
        <div class="navbar-user action-group">
            <button class="btn btn-secondary" onclick="location.href='contractors.html'">← 返回工程行列表</button>
            <button class="btn btn-primary" id="editBtn">✏️ 編輯</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div id="loadingState" class="empty-box">載入中...</div>
            <div id="detailContent" style="display:none;"></div>
        </div>
    </div>

    <script src="utils.js?v=20260320f"></script>
    <script src="auth.js?v=20260320f"></script>
    <script src="toast.js?v=20260320f"></script>
    <script src="config-api.js?v=20260320f"></script>
    <script src="api-quote.js?v=20260320f"></script>
    <script>
        const currentUser = Auth.requireLogin();
        const contractorId = new URLSearchParams(location.search).get('id');
        const statusNames = { active: '合作中', inactive: '停用', quoted: '已報價', signed: '已簽約', construction: '施工中', completed: '已完工', paid: '已結清' };

        if (!contractorId) {
            Toast.error('缺少工程行 ID');
            setTimeout(() => location.href = 'contractors.html', 800);
        } else if (currentUser) {
            loadDetail();
        }

        async function loadDetail() {
            const [contractorResult, projectsResult] = await Promise.all([
                QuoteAPI.getContractor(contractorId),
                QuoteAPI.getContractorProjects(contractorId)
            ]);

            if (!contractorResult.success) {
                Toast.error('載入工程行失敗：' + (contractorResult.error || '未知錯誤'));
                setTimeout(() => location.href = 'contractors.html', 800);
                return;
            }

            renderDetail(contractorResult.contractor, projectsResult.projects || []);
        }

        function renderStars(rating) {
            const rounded = Math.round(Number(rating || 0));
            return `<span class="stars">${'★'.repeat(rounded)}<span class="muted-stars">${'★'.repeat(Math.max(0, 5 - rounded))}</span></span><span class="rating-text">${Number(rating || 0).toFixed(1)}</span>`;
        }

        function renderDetail(contractor, projects) {
            const container = document.getElementById('detailContent');
            document.getElementById('loadingState').style.display = 'none';
            container.style.display = 'block';
            document.getElementById('editBtn').onclick = () => location.href = `contractors.html?edit=${encodeURIComponent(contractor.id || '')}`;

            container.innerHTML = `
                <section class="detail-hero">
                    <div>
                        <div class="title-row">
                            <h2>${Utils.escapeHtml(contractor.companyName || '-')}</h2>
                            <span class="status-badge status-${Utils.escapeHtml(contractor.status)}">${Utils.escapeHtml(statusNames[contractor.status] || contractor.status || '-')}</span>
                        </div>
                        <p class="subtle">聯絡人：${Utils.escapeHtml(contractor.contactName || '-')}</p>
                        <div class="rating-box">${renderStars(contractor.rating)}</div>
                    </div>
                    <div class="quick-actions">
                        <a class="btn btn-secondary" href="tel:${encodeURIComponent(contractor.phone || '')}">📞 快速撥號</a>
                        ${contractor.lineUrl ? `<a class="btn btn-secondary" href="${Utils.escapeHtml(contractor.lineUrl)}" target="_blank" rel="noopener">LINE 聯絡</a>` : ''}
                    </div>
                </section>

                <section class="info-grid">
                    <div class="info-card">
                        <h3>基本資訊</h3>
                        <p><strong>電話：</strong>${Utils.escapeHtml(contractor.phone || '-')}</p>
                        <p><strong>Email：</strong>${Utils.escapeHtml(contractor.email || '-')}</p>
                        <p><strong>LINE ID：</strong>${Utils.escapeHtml(contractor.lineId || '-')}</p>
                        <p><strong>地址：</strong>${Utils.escapeHtml(contractor.address || '-')}</p>
                        <p><strong>備註：</strong>${Utils.escapeHtml(contractor.note || '-')}</p>
                    </div>
                    <div class="info-card">
                        <h3>專長標籤</h3>
                        <div class="badge-wrap">${(contractor.specialties || []).map(s => `<span class="specialty-badge">${Utils.escapeHtml(s)}</span>`).join('') || '<span class="subtle">尚未設定專長</span>'}</div>
                    </div>
                </section>

                <section class="info-card" style="margin-top:18px;">
                    <div class="section-head">
                        <h3>合作歷史</h3>
                        <span class="subtle">共 ${projects.length} 筆</span>
                    </div>
                    ${projects.length ? `
                        <div class="table-wrap">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>專案編號</th>
                                        <th>客戶姓名</th>
                                        <th>專案金額</th>
                                        <th>完成日期</th>
                                        <th>專案狀態</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${projects.map(project => `
                                        <tr>
                                            <td>${Utils.escapeHtml(project.projectNumber || '-')}</td>
                                            <td>${Utils.escapeHtml(project.customerName || '-')}</td>
                                            <td>${Utils.formatPrice(project.totalPrice || 0)}</td>
                                            <td>${Utils.formatDate(project.completedDate)}</td>
                                            <td><span class="status-badge status-${Utils.escapeHtml(project.status || '')}">${Utils.escapeHtml(statusNames[project.status] || project.status || '-')}</span></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>` : '<div class="empty-box">目前尚無合作專案</div>'}
                </section>
            `;
        }
    </script>

    <style>
        .action-group { display:flex; gap:10px; align-items:center; }
        .detail-hero { display:flex; justify-content:space-between; gap:16px; padding-bottom:20px; border-bottom:1px solid #e2e8f0; }
        .title-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .quick-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
        .subtle { color:#64748b; }
        .info-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; margin-top:18px; }
        .info-card { border:1px solid #e2e8f0; border-radius:14px; padding:18px; background:#fff; }
        .info-card h3 { margin-bottom:12px; }
        .badge-wrap { display:flex; flex-wrap:wrap; gap:8px; }
        .specialty-badge { display:inline-flex; padding:6px 10px; background:#eef2ff; color:#4338ca; border-radius:999px; }
        .stars { color:#f59e0b; font-weight:700; }
        .muted-stars { color:#e2e8f0; }
        .rating-text { margin-left:8px; color:#475569; }
        .section-head { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:12px; }
        @media (max-width: 768px) {
            .detail-hero, .info-grid, .action-group { flex-direction:column; grid-template-columns:1fr; }
            .quick-actions .btn, .action-group .btn { width:100%; }
        }
    </style>
</body>
</html>
