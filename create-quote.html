<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增報價單 - ONE桌遊報價管理系統</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .wizard-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }
        
        .wizard-step {
            flex: 1;
            text-align: center;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .wizard-step.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .wizard-step.completed {
            background: var(--success);
            color: white;
        }
        
        .wizard-content {
            display: none;
        }
        
        .wizard-content.active {
            display: block;
        }
        
        .item-selector {
            margin: 20px 0;
        }
        
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .category-tab {
            padding: 10px 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-tab.active {
            background: var(--primary);
            color: white;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f7fafc;
            border-radius: 10px;
        }
        
        .item-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .item-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .item-card.selected {
            border-color: var(--primary);
            background: #f0f4ff;
        }
        
        .selected-items {
            margin-top: 30px;
        }
        
        .selected-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }
        
        .quantity-input {
            width: 80px;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 6px;
            text-align: center;
        }
        
        .price-input {
            width: 120px;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 6px;
        }
        
        .summary-box {
            background: #f7fafc;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--primary);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .summary-row.total {
            border-bottom: none;
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary);
            padding-top: 15px;
            margin-top: 10px;
            border-top: 2px solid var(--primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" style="width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-right: 10px;">
            ONE桌遊報價管理系統
        </div>
        <div class="navbar-user">
            <button class="btn-logout" onclick="location.href='dashboard.html'">← 返回列表</button>
        </div>
    </nav>

    <div class="container">
        <!-- 步驟指示 -->
        <div class="wizard-steps">
            <div class="wizard-step active" data-step="1">
                <h3>步驟 1</h3>
                <p>客戶資訊</p>
            </div>
            <div class="wizard-step" data-step="2">
                <h3>步驟 2</h3>
                <p>選擇項目</p>
            </div>
            <div class="wizard-step" data-step="3">
                <h3>步驟 3</h3>
                <p>確認報價</p>
            </div>
        </div>

        <!-- 步驟 1: 客戶資訊 -->
        <div class="card wizard-content active" data-step="1">
            <h2>📋 客戶資訊</h2>
            
            <div class="form-row">
                <label>店名 *</label>
                <input type="text" id="storeName" required placeholder="例如：台北大安店">
            </div>
            
            <div class="form-row">
                <label>地址 *</label>
                <input type="text" id="address" required placeholder="例如：台北市大安區復興南路一段100號">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-row">
                    <label>聯絡人</label>
                    <input type="text" id="contact" placeholder="例如：王小明">
                </div>
                
                <div class="form-row">
                    <label>電話</label>
                    <input type="text" id="phone" placeholder="例如：0912-345-678">
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-row">
                    <label>包廂數</label>
                    <input type="number" id="rooms" min="1" placeholder="例如：10">
                </div>
                
                <div class="form-row">
                    <label>營業坪數</label>
                    <input type="number" id="area" min="1" placeholder="例如：50">
                </div>
            </div>
            
            <div class="form-row">
                <label>負責人 *</label>
                <select id="assignee" required>
                    <option value="">請選擇負責人</option>
                </select>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="nextStep()">下一步 →</button>
            </div>
        </div>

        <!-- 步驟 2: 選擇項目 -->
        <div class="card wizard-content" data-step="2">
            <h2>🛍️ 選擇項目</h2>
            
            <div class="category-tabs" id="categoryTabs"></div>
            
            <div class="items-grid" id="itemsGrid"></div>
            
            <div class="selected-items">
                <h3>已選擇項目 (<span id="selectedCount">0</span>)</h3>
                <div id="selectedItemsList"></div>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="prevStep()">← 上一步</button>
                <button class="btn btn-primary" onclick="nextStep()">下一步 →</button>
            </div>
        </div>

        <!-- 步驟 3: 確認報價 -->
        <div class="card wizard-content" data-step="3">
            <h2>✅ 確認報價</h2>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                <!-- 報價明細 -->
                <div>
                    <h3>報價明細</h3>
                    <div id="finalItemsList"></div>
                </div>
                
                <!-- 費用總計 -->
                <div>
                    <div class="summary-box">
                        <h3 style="margin-bottom: 15px;">💰 費用總計</h3>
                        <div class="summary-row">
                            <span>項目數量：</span>
                            <strong><span id="totalItems">0</span> 項</strong>
                        </div>
                        <div class="summary-row">
                            <span>小計：</span>
                            <strong>$<span id="subtotal">0</span></strong>
                        </div>
                        <div class="summary-row total">
                            <span>總計：</span>
                            <strong>$<span id="grandTotal">0</span></strong>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <label>備註</label>
                        <textarea id="notes" rows="4" style="width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px;" placeholder="特殊需求、優惠說明等..."></textarea>
                    </div>
                </div>
            </div>
            
            <div class="btn-group" style="margin-top: 30px;">
                <button class="btn btn-secondary" onclick="prevStep()">← 上一步</button>
                <button class="btn btn-primary" onclick="saveQuote()">💾 儲存報價單</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let currentStep = 1;
        let selectedItems = [];
        let priceTable = JSON.parse(localStorage.getItem('priceTable') || '[]');
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        
        // 初始化
        function init() {
            // 載入負責人選項
            const assigneeSelect = document.getElementById('assignee');
            users.filter(u => u.role === 'admin' || u.role === 'staff').forEach(user => {
                const option = document.createElement('option');
                option.value = user.id;
                option.textContent = user.name;
                assigneeSelect.appendChild(option);
            });
            
            // 載入分類標籤
            const categories = [...new Set(priceTable.map(item => item.category))];
            const categoryTabs = document.getElementById('categoryTabs');
            
            const allTab = document.createElement('button');
            allTab.className = 'category-tab active';
            allTab.textContent = '全部';
            allTab.onclick = () => filterCategory('');
            categoryTabs.appendChild(allTab);
            
            categories.forEach(cat => {
                const tab = document.createElement('button');
                tab.className = 'category-tab';
                tab.textContent = cat;
                tab.onclick = () => filterCategory(cat);
                categoryTabs.appendChild(tab);
            });
            
            renderItems('');
        }
        
        function filterCategory(category) {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            renderItems(category);
        }
        
        function renderItems(category) {
            const filtered = category ? priceTable.filter(item => item.category === category) : priceTable;
            const grid = document.getElementById('itemsGrid');
            
            grid.innerHTML = filtered.map(item => `
                <div class="item-card ${selectedItems.find(i => i.id === item.id) ? 'selected' : ''}" 
                     onclick="toggleItem('${item.id}')">
                    <strong>${item.name}</strong>
                    <div style="color: #666; font-size: 0.9em; margin-top: 5px;">
                        <div>單價：$${item.price.toLocaleString()} / ${item.unit}</div>
                        <div style="font-size: 0.85em; color: #999;">${item.category}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleItem(itemId) {
            const item = priceTable.find(i => i.id === itemId);
            const index = selectedItems.findIndex(i => i.id === itemId);
            
            if (index > -1) {
                selectedItems.splice(index, 1);
            } else {
                selectedItems.push({
                    ...item,
                    quantity: 1,
                    customPrice: item.price,
                    total: item.price
                });
            }
            
            updateSelectedItems();
            renderItems(document.querySelector('.category-tab.active').textContent === '全部' ? '' : document.querySelector('.category-tab.active').textContent);
        }
        
        function updateSelectedItems() {
            document.getElementById('selectedCount').textContent = selectedItems.length;
            
            const list = document.getElementById('selectedItemsList');
            list.innerHTML = selectedItems.map((item, index) => `
                <div class="selected-item">
                    <div style="flex: 1;">
                        <strong>${item.name}</strong>
                        <div style="color: #666; font-size: 0.9em;">單價：$${item.price.toLocaleString()} / ${item.unit}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="number" class="quantity-input" min="1" value="${item.quantity}" 
                               onchange="updateQuantity(${index}, this.value)">
                        <span>${item.unit}</span>
                        <strong style="width: 100px; text-align: right;">$${item.total.toLocaleString()}</strong>
                        <button class="btn btn-danger" style="padding: 6px 12px;" onclick="removeItem(${index})">移除</button>
                    </div>
                </div>
            `).join('');
        }
        
        function updateQuantity(index, quantity) {
            selectedItems[index].quantity = parseFloat(quantity);
            selectedItems[index].total = selectedItems[index].customPrice * parseFloat(quantity);
            updateSelectedItems();
        }
        
        function removeItem(index) {
            selectedItems.splice(index, 1);
            updateSelectedItems();
            renderItems(document.querySelector('.category-tab.active').textContent === '全部' ? '' : document.querySelector('.category-tab.active').textContent);
        }
        
        function nextStep() {
            // 驗證當前步驟
            if (currentStep === 1) {
                if (!document.getElementById('storeName').value || !document.getElementById('address').value || !document.getElementById('assignee').value) {
                    alert('請填寫必填欄位（店名、地址、負責人）');
                    return;
                }
            }
            
            if (currentStep === 2) {
                if (selectedItems.length === 0) {
                    alert('請至少選擇一個項目');
                    return;
                }
                renderFinalSummary();
            }
            
            currentStep++;
            if (currentStep > 3) currentStep = 3;
            updateSteps();
        }
        
        function prevStep() {
            currentStep--;
            if (currentStep < 1) currentStep = 1;
            updateSteps();
        }
        
        function updateSteps() {
            document.querySelectorAll('.wizard-step').forEach(step => {
                const stepNum = parseInt(step.dataset.step);
                step.classList.remove('active', 'completed');
                if (stepNum === currentStep) {
                    step.classList.add('active');
                } else if (stepNum < currentStep) {
                    step.classList.add('completed');
                }
            });
            
            document.querySelectorAll('.wizard-content').forEach(content => {
                content.classList.remove('active');
                if (parseInt(content.dataset.step) === currentStep) {
                    content.classList.add('active');
                }
            });
        }
        
        function renderFinalSummary() {
            const list = document.getElementById('finalItemsList');
            const total = selectedItems.reduce((sum, item) => sum + item.total, 0);
            
            list.innerHTML = selectedItems.map(item => `
                <div style="padding: 12px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between;">
                    <div>
                        <strong>${item.name}</strong>
                        <div style="color: #666; font-size: 0.9em;">${item.quantity} ${item.unit} × $${item.customPrice.toLocaleString()}</div>
                    </div>
                    <strong>$${item.total.toLocaleString()}</strong>
                </div>
            `).join('');
            
            document.getElementById('totalItems').textContent = selectedItems.length;
            document.getElementById('subtotal').textContent = total.toLocaleString();
            document.getElementById('grandTotal').textContent = total.toLocaleString();
        }
        
        function saveQuote() {
            const projects = JSON.parse(localStorage.getItem('projects') || '[]');
            const nextId = parseInt(localStorage.getItem('nextProjectId') || '2');
            
            const newProject = {
                id: `P-2024${String(nextId).padStart(3, '0')}`,
                storeName: document.getElementById('storeName').value,
                address: document.getElementById('address').value,
                contact: document.getElementById('contact').value || '-',
                phone: document.getElementById('phone').value || '-',
                lineId: '',
                rooms: parseInt(document.getElementById('rooms').value) || 0,
                area: parseInt(document.getElementById('area').value) || 0,
                status: 'quoted',
                assignee: document.getElementById('assignee').value,
                createdDate: new Date().toISOString().split('T')[0],
                quoteDate: new Date().toISOString().split('T')[0],
                signDate: null,
                startDate: null,
                expectedEndDate: null,
                completedDate: null,
                totalAmount: selectedItems.reduce((sum, item) => sum + item.total, 0),
                paidAmount: 0,
                quoteVersions: [{
                    version: 'v1',
                    date: new Date().toISOString().split('T')[0],
                    totalAmount: selectedItems.reduce((sum, item) => sum + item.total, 0),
                    operator: JSON.parse(localStorage.getItem('currentUser')).id,
                    reason: '初次報價',
                    note: document.getElementById('notes').value || '',
                    items: selectedItems.map(item => ({
                        itemId: item.id,
                        name: item.name,
                        quantity: item.quantity,
                        price: item.customPrice,
                        total: item.total,
                        note: ''
                    }))
                }],
                payments: [],
                progress: [],
                statusLogs: [{
                    date: new Date().toISOString().split('T')[0],
                    status: '報價建立',
                    operator: JSON.parse(localStorage.getItem('currentUser')).id,
                    note: `初次報價 $${selectedItems.reduce((sum, item) => sum + item.total, 0).toLocaleString()}`
                }]
            };
            
            projects.push(newProject);
            localStorage.setItem('projects', JSON.stringify(projects));
            localStorage.setItem('nextProjectId', String(nextId + 1));
            
            alert('報價單建立成功！');
            location.href = 'project.html?id=' + newProject.id;
        }
        
        init();
    </script>
</body>
</html>
