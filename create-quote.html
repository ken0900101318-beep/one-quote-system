<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增報價單 - ONE桌遊報價管理系統</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .wizard-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }
        
        .wizard-step {
            flex: 1;
            text-align: center;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .wizard-step.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .wizard-step.completed {
            background: var(--success);
            color: white;
        }
        
        .wizard-content {
            display: none;
        }
        
        .wizard-content.active {
            display: block;
        }
        
        .item-selector {
            margin: 20px 0;
        }
        
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .category-tab {
            padding: 10px 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        
        .category-tab.active {
            background: var(--primary);
            color: white;
        }
        
        .category-tab.main-category {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }
        
        .category-tab.main-category.active {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }
        
        .sub-category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
        }
        
        .sub-category-tab {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .sub-category-tab:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        
        .sub-category-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f7fafc;
            border-radius: 10px;
        }
        
        .item-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .item-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .item-card.selected {
            border-color: var(--primary);
            background: #f0f4ff;
        }
        
        .selected-items {
            margin-top: 30px;
        }
        
        .selected-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }
        
        .quantity-input {
            width: 80px;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 6px;
            text-align: center;
        }
        
        .price-input {
            width: 120px;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: 6px;
        }
        
        .summary-box {
            background: #f7fafc;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--primary);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .summary-row.total {
            border-bottom: none;
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary);
            padding-top: 15px;
            margin-top: 10px;
            border-top: 2px solid var(--primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="one-logo.jpg" alt="ONE桌遊" style="width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-right: 10px;">
            ONE桌遊報價管理系統
        </div>
        <div class="navbar-user">
            <button class="btn-logout" onclick="location.href='dashboard.html'">← 返回列表</button>
        </div>
    </nav>

    <div class="container">
        <!-- 步驟指示 -->
        <div class="wizard-steps">
            <div class="wizard-step active" data-step="1">
                <h3>步驟 1</h3>
                <p>客戶資訊</p>
            </div>
            <div class="wizard-step" data-step="2">
                <h3>步驟 2</h3>
                <p>選擇項目</p>
            </div>
            <div class="wizard-step" data-step="3">
                <h3>步驟 3</h3>
                <p>確認報價</p>
            </div>
        </div>

        <!-- 步驟 1: 客戶資訊 -->
        <div class="card wizard-content active" data-step="1">
            <h2>📋 客戶資訊</h2>
            
            <div class="form-row">
                <label>店名 *</label>
                <input type="text" id="storeName" required placeholder="例如：台北大安店">
            </div>
            
            <div class="form-row">
                <label>地址 *</label>
                <input type="text" id="address" required placeholder="例如：台北市大安區復興南路一段100號">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-row">
                    <label>聯絡人</label>
                    <input type="text" id="contact" placeholder="例如：王小明">
                </div>
                
                <div class="form-row">
                    <label>電話</label>
                    <input type="text" id="phone" placeholder="例如：0912-345-678">
                </div>
                
                <div class="form-row">
                    <label>工程行名稱</label>
                    <input type="text" id="contractorName" placeholder="例如：○○工程行">
                    <small style="color: #999; font-size: 0.85em;">用於工程行報價單抬頭</small>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="form-row">
                    <label>包廂數</label>
                    <input type="number" id="rooms" min="0" value="0" placeholder="例如：10">
                </div>
                
                <div class="form-row">
                    <label>開放式數量</label>
                    <input type="number" id="openSeats" min="0" value="0" placeholder="例如：5">
                </div>
                
                <div class="form-row">
                    <label>營業坪數</label>
                    <input type="number" id="area" min="1" placeholder="例如：50">
                </div>
            </div>
            
            <div class="form-row">
                <label>負責人 *</label>
                <select id="assignee" required>
                    <option value="">請選擇負責人</option>
                </select>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="nextStep()">下一步 →</button>
            </div>
        </div>

        <!-- 步驟 2: 選擇項目 -->
        <div class="card wizard-content" data-step="2">
            <h2>🛍️ 選擇項目</h2>
            
            <div class="category-tabs" id="categoryTabs"></div>
            <div class="sub-category-tabs" id="subCategoryTabs"></div>
            
            <div class="items-grid" id="itemsGrid"></div>
            
            <div class="selected-items">
                <h3>已選擇項目 (<span id="selectedCount">0</span>)</h3>
                <div id="selectedItemsList"></div>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="prevStep()">← 上一步</button>
                <button class="btn btn-primary" onclick="nextStep()">下一步 →</button>
            </div>
        </div>

        <!-- 步驟 3: 確認報價 -->
        <div class="card wizard-content" data-step="3">
            <h2>✅ 確認報價</h2>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                <!-- 報價明細 -->
                <div>
                    <h3>報價明細</h3>
                    <div id="finalItemsList"></div>
                </div>
                
                <!-- 費用總計 -->
                <div>
                    <div class="summary-box">
                        <h3 style="margin-bottom: 15px;">💰 費用總計</h3>
                        <div class="summary-row">
                            <span>項目數量：</span>
                            <strong><span id="totalItems">0</span> 項</strong>
                        </div>
                        <div class="summary-row">
                            <span>小計：</span>
                            <strong>$<span id="subtotal">0</span></strong>
                        </div>
                        <div class="summary-row" id="globalSalesRow" style="display: none;">
                            <span style="color: #3b82f6;">業務優惠：</span>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <strong style="color: #3b82f6;">-$<span id="globalSalesAmount">0</span></strong>
                                <button class="btn" style="padding: 4px 8px; font-size: 0.8em;" onclick="setGlobalSalesDiscount()">修改</button>
                            </div>
                        </div>
                        <div class="summary-row" id="globalCompanyRow" style="display: none;">
                            <span style="color: #10b981;">公司優惠：</span>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <strong style="color: #10b981;">-$<span id="globalCompanyAmount">0</span></strong>
                                <button class="btn" style="padding: 4px 8px; font-size: 0.8em;" onclick="setGlobalCompanyDiscount()">修改</button>
                            </div>
                        </div>
                        <div class="summary-row">
                            <button class="btn" style="padding: 8px 12px; background: #3b82f6; color: white; margin-right: 5px;" onclick="setGlobalSalesDiscount()">💼 整單業務優惠</button>
                            <button class="btn" style="padding: 8px 12px; background: #10b981; color: white;" onclick="setGlobalCompanyDiscount()">🏢 整單公司優惠</button>
                        </div>
                        <div class="summary-row total">
                            <span>總計：</span>
                            <strong>$<span id="grandTotal">0</span></strong>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <label>備註</label>
                        <textarea id="notes" rows="4" style="width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px;" placeholder="特殊需求、優惠說明等..."></textarea>
                    </div>
                </div>
            </div>
            
            <div class="btn-group" style="margin-top: 30px;">
                <button class="btn btn-secondary" onclick="prevStep()">← 上一步</button>
                <button class="btn btn-primary" onclick="saveQuote()">💾 儲存報價單</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="ensure-data.js"></script>
    <script>
        // 🔧 在讀取數據前確保已初始化
        if (typeof ensureDataInitialized === 'function') {
            ensureDataInitialized();
        }

        let currentStep = 1;
        let selectedItems = [];
        let priceTable = JSON.parse(localStorage.getItem('priceTable') || '[]');
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        let currentMainCategory = ''; // 當前選擇的主分類
        let currentSubCategory = ''; // 當前選擇的子分類
        let globalSalesDiscount = 0; // 整單業務優惠
        let globalCompanyDiscount = 0; // 整單公司優惠
        
        // 初始化
        function init() {
            // 載入負責人選項
            const assigneeSelect = document.getElementById('assignee');
            users.filter(u => u.role === 'admin' || u.role === 'staff').forEach(user => {
                const option = document.createElement('option');
                option.value = user.id;
                option.textContent = user.name;
                assigneeSelect.appendChild(option);
            });
            
            // 載入主分類標籤（改為固定兩個：公司報價、工程行報價）
            const categoryTabs = document.getElementById('categoryTabs');
            
            const allTab = document.createElement('button');
            allTab.className = 'category-tab active';
            allTab.textContent = '📋 全部';
            allTab.onclick = () => filterMainCategory('');
            categoryTabs.appendChild(allTab);
            
            // 公司報價
            const companyTab = document.createElement('button');
            companyTab.className = 'category-tab main-category';
            companyTab.textContent = '🏢 公司報價';
            companyTab.onclick = () => filterMainCategory('公司');
            categoryTabs.appendChild(companyTab);
            
            // 工程行報價
            const contractorTab = document.createElement('button');
            contractorTab.className = 'category-tab main-category';
            contractorTab.textContent = '🏗️ 工程行報價';
            contractorTab.onclick = () => filterMainCategory('工班');
            categoryTabs.appendChild(contractorTab);
            
            // 初始顯示所有子分類
            loadSubCategories('');
            renderItems('', '');
        }
        
        // 主分類篩選
        function filterMainCategory(category) {
            currentMainCategory = category;
            currentSubCategory = '';
            
            // 更新主分類標籤樣式
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 載入對應的子分類
            loadSubCategories(category);
            
            // 重新渲染項目
            renderItems(category, '');
        }
        
        // 載入子分類標籤
        function loadSubCategories(mainCategory) {
            const filtered = mainCategory ? priceTable.filter(item => item.category === mainCategory) : priceTable;
            const subCategories = [...new Set(filtered.map(item => item.subCategory).filter(Boolean))];
            
            const subCategoryTabs = document.getElementById('subCategoryTabs');
            
            if (subCategories.length === 0) {
                subCategoryTabs.innerHTML = '<p style="margin: 0; color: #999;">無子分類</p>';
                return;
            }
            
            subCategoryTabs.innerHTML = '';
            
            // 全部子分類
            const allSubTab = document.createElement('button');
            allSubTab.className = 'sub-category-tab active';
            allSubTab.textContent = '全部';
            allSubTab.onclick = () => filterSubCategory('');
            subCategoryTabs.appendChild(allSubTab);
            
            // 各子分類
            subCategories.sort().forEach(subCat => {
                const tab = document.createElement('button');
                tab.className = 'sub-category-tab';
                tab.textContent = subCat;
                tab.onclick = () => filterSubCategory(subCat);
                subCategoryTabs.appendChild(tab);
            });
        }
        
        // 子分類篩選
        function filterSubCategory(subCategory) {
            currentSubCategory = subCategory;
            
            // 更新子分類標籤樣式
            document.querySelectorAll('.sub-category-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重新渲染項目
            renderItems(currentMainCategory, subCategory);
        }
        
        // 渲染項目列表
        function renderItems(mainCategory, subCategory) {
            let filtered = priceTable;
            
            // 先按主分類篩選
            if (mainCategory) {
                filtered = filtered.filter(item => item.category === mainCategory);
            }
            
            // 再按子分類篩選
            if (subCategory) {
                filtered = filtered.filter(item => item.subCategory === subCategory);
            }
            
            const grid = document.getElementById('itemsGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">無符合的項目</p>';
                return;
            }
            
            grid.innerHTML = filtered.map(item => `
                <div class="item-card ${selectedItems.find(i => i.id === item.id) ? 'selected' : ''}" 
                     onclick="toggleItem('${item.id}')">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 5px;">
                        <strong style="flex: 1;">${item.name}</strong>
                        <span style="background: #e2e8f0; color: #4a5568; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; white-space: nowrap;">${item.subCategory || '其他'}</span>
                    </div>
                    <div style="color: #666; font-size: 0.9em;">
                        <div>單價：$${item.price.toLocaleString()} / ${item.unit}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleItem(itemId) {
            const item = priceTable.find(i => i.id === itemId);
            const index = selectedItems.findIndex(i => i.id === itemId);
            
            if (index > -1) {
                selectedItems.splice(index, 1);
            } else {
                // 讀取包廂數和開放桌數
                const rooms = parseInt(document.getElementById('rooms').value) || 0;
                const openSeats = parseInt(document.getElementById('openSeats').value) || 0;
                
                // 智能預設數量
                let defaultQuantity = 1;
                
                // 包廂數量的項目：智能門鎖、ONE木門、藍牙喇叭、門牌燈、智能控電
                if (item.name.includes('智能門鎖') || 
                    item.name.includes('ONE客製木門') || 
                    item.name.includes('木門') ||
                    item.name.includes('藍牙喇叭') || 
                    item.name.includes('藍芽喇叭') ||
                    item.name.includes('門牌燈') ||
                    item.name.includes('智能控電')) {
                    defaultQuantity = rooms;
                }
                
                // 包廂數 + 開放桌數的項目：麻將桌、麻將椅、門弓器
                if (item.name.includes('麻將桌') || 
                    item.name.includes('麻將椅') ||
                    item.name.includes('門弓器')) {
                    defaultQuantity = rooms + openSeats;
                }
                
                // 確保至少為 1
                if (defaultQuantity < 1) defaultQuantity = 1;
                
                selectedItems.push({
                    ...item,
                    quantity: defaultQuantity,
                    customPrice: item.price,
                    total: item.price * defaultQuantity,
                    isFree: false,
                    salesDiscount: 0,      // 業務優惠金額
                    companyDiscount: 0,    // 公司優惠金額
                    note: ''               // 備註
                });
            }
            
            updateSelectedItems();
            // 使用當前的主分類和子分類重新渲染
            renderItems(currentMainCategory, currentSubCategory);
        }
        
        function updateSelectedItems() {
            document.getElementById('selectedCount').textContent = selectedItems.length;
            
            const list = document.getElementById('selectedItemsList');
            list.innerHTML = selectedItems.map((item, index) => {
                const originalTotal = item.quantity * item.price;
                const afterDiscount = originalTotal - item.salesDiscount - item.companyDiscount;
                const hasDiscount = item.salesDiscount > 0 || item.companyDiscount > 0;
                
                return `
                <div class="selected-item" style="display: block; padding: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
                        <div style="flex: 1;">
                            <strong>${item.name}</strong>
                            <div style="color: #666; font-size: 0.9em;">
                                ${item.isFree ? '<span style="color: #10b981; font-weight: bold;">🎁 公司贈送</span>' : `單價：$${item.price.toLocaleString()} / ${item.unit}`}
                            </div>
                            ${hasDiscount && !item.isFree ? `
                            <div style="font-size: 0.85em; color: #666; margin-top: 5px;">
                                原價：$${originalTotal.toLocaleString()}
                                ${item.salesDiscount > 0 ? `<br><span style="color: #3b82f6;">業務優惠：-$${item.salesDiscount.toLocaleString()}</span>` : ''}
                                ${item.companyDiscount > 0 ? `<br><span style="color: #10b981;">公司優惠：-$${item.companyDiscount.toLocaleString()}</span>` : ''}
                            </div>
                            ` : ''}
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                            <input type="number" class="quantity-input" min="1" value="${item.quantity}" 
                                   onchange="updateQuantity(${index}, this.value)">
                            <span>${item.unit}</span>
                            <strong style="width: 100px; text-align: right;">$${(item.isFree ? 0 : afterDiscount).toLocaleString()}</strong>
                            ${!item.isFree ? `
                            <button class="btn" style="padding: 6px 10px; background: #3b82f6; color: white; font-size: 0.85em;" onclick="setSalesDiscount(${index})">💼 業務優惠</button>
                            <button class="btn" style="padding: 6px 10px; background: #10b981; color: white; font-size: 0.85em;" onclick="setCompanyDiscount(${index})">🏢 公司優惠</button>
                            <button class="btn" style="padding: 6px 10px; background: #8b5cf6; color: white; font-size: 0.85em;" onclick="setFreeItem(${index})">🎁 贈送</button>
                            ` : `
                            <button class="btn" style="padding: 6px 10px; background: #f59e0b; color: white; font-size: 0.85em;" onclick="restorePriceItem(${index})">↩️ 恢復</button>
                            `}
                            <button class="btn btn-danger" style="padding: 6px 10px; font-size: 0.85em;" onclick="removeItem(${index})">移除</button>
                        </div>
                    </div>
                    <div style="margin-top: 10px;">
                        <input type="text" 
                               placeholder="📝 備註（例如：特殊規格、安裝位置等）" 
                               value="${item.note || ''}"
                               onchange="updateItemNote(${index}, this.value)"
                               style="width: 100%; padding: 8px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 0.9em;">
                    </div>
                </div>
                `;
            }).join('');
        }
        
        // 設定為公司贈送（金額變 0）
        function setFreeItem(index) {
            selectedItems[index].isFree = true;
            selectedItems[index].customPrice = 0;
            selectedItems[index].total = 0;
            updateSelectedItems();
        }
        
        // 恢復原價
        function restorePriceItem(index) {
            selectedItems[index].isFree = false;
            selectedItems[index].customPrice = selectedItems[index].price;
            selectedItems[index].total = selectedItems[index].price * selectedItems[index].quantity;
            selectedItems[index].salesDiscount = 0;
            selectedItems[index].companyDiscount = 0;
            updateSelectedItems();
        }
        
        // 設定業務優惠
        function setSalesDiscount(index) {
            const item = selectedItems[index];
            const originalTotal = item.quantity * item.price;
            
            const type = prompt('選擇優惠方式：\n1 = 固定金額\n2 = 折扣比例（例如：9折）', '1');
            if (!type) return;
            
            if (type === '1') {
                const amount = prompt(`業務優惠金額（原價：$${originalTotal.toLocaleString()}）:`, '0');
                if (amount === null) return;
                
                const discount = parseFloat(amount);
                if (isNaN(discount) || discount < 0) {
                    alert('請輸入有效的金額！');
                    return;
                }
                
                if (discount > originalTotal) {
                    alert('優惠金額不能超過原價！');
                    return;
                }
                
                selectedItems[index].salesDiscount = discount;
            } else if (type === '2') {
                const percent = prompt('折扣（例如：9 = 9折，85 = 85折）:', '9');
                if (percent === null) return;
                
                const discount = parseFloat(percent);
                if (isNaN(discount) || discount <= 0 || discount >= 100) {
                    alert('請輸入有效的折扣（1-99）！');
                    return;
                }
                
                selectedItems[index].salesDiscount = Math.round(originalTotal * (100 - discount) / 100);
            } else {
                alert('請輸入 1 或 2');
                return;
            }
            
            updateSelectedItems();
        }
        
        // 設定公司優惠
        function setCompanyDiscount(index) {
            const item = selectedItems[index];
            const originalTotal = item.quantity * item.price;
            const afterSales = originalTotal - item.salesDiscount;
            
            const type = prompt('選擇優惠方式：\n1 = 固定金額\n2 = 折扣比例（例如：9折）', '1');
            if (!type) return;
            
            if (type === '1') {
                const amount = prompt(`公司優惠金額（扣除業務優惠後：$${afterSales.toLocaleString()}）:`, '0');
                if (amount === null) return;
                
                const discount = parseFloat(amount);
                if (isNaN(discount) || discount < 0) {
                    alert('請輸入有效的金額！');
                    return;
                }
                
                if (discount > afterSales) {
                    alert('優惠金額不能超過扣除業務優惠後的金額！');
                    return;
                }
                
                selectedItems[index].companyDiscount = discount;
            } else if (type === '2') {
                const percent = prompt('折扣（例如：9 = 9折，85 = 85折）:', '9');
                if (percent === null) return;
                
                const discount = parseFloat(percent);
                if (isNaN(discount) || discount <= 0 || discount >= 100) {
                    alert('請輸入有效的折扣（1-99）！');
                    return;
                }
                
                selectedItems[index].companyDiscount = Math.round(afterSales * (100 - discount) / 100);
            } else {
                alert('請輸入 1 或 2');
                return;
            }
            
            updateSelectedItems();
        }
        
        function updateQuantity(index, quantity) {
            selectedItems[index].quantity = parseFloat(quantity);
            // 如果不是贈送品，重新計算總價
            if (!selectedItems[index].isFree) {
                selectedItems[index].total = selectedItems[index].customPrice * parseFloat(quantity);
            } else {
                selectedItems[index].total = 0;
            }
            updateSelectedItems();
        }
        
        // 更新項目備註
        function updateItemNote(index, note) {
            selectedItems[index].note = note;
        }
        
        function removeItem(index) {
            selectedItems.splice(index, 1);
            updateSelectedItems();
            renderItems(document.querySelector('.category-tab.active').textContent === '全部' ? '' : document.querySelector('.category-tab.active').textContent);
        }
        
        function nextStep() {
            // 驗證當前步驟
            if (currentStep === 1) {
                if (!document.getElementById('storeName').value || !document.getElementById('address').value || !document.getElementById('assignee').value) {
                    alert('請填寫必填欄位（店名、地址、負責人）');
                    return;
                }
            }
            
            if (currentStep === 2) {
                if (selectedItems.length === 0) {
                    alert('請至少選擇一個項目');
                    return;
                }
                renderFinalSummary();
            }
            
            currentStep++;
            if (currentStep > 3) currentStep = 3;
            updateSteps();
        }
        
        function prevStep() {
            currentStep--;
            if (currentStep < 1) currentStep = 1;
            updateSteps();
        }
        
        function updateSteps() {
            document.querySelectorAll('.wizard-step').forEach(step => {
                const stepNum = parseInt(step.dataset.step);
                step.classList.remove('active', 'completed');
                if (stepNum === currentStep) {
                    step.classList.add('active');
                } else if (stepNum < currentStep) {
                    step.classList.add('completed');
                }
            });
            
            document.querySelectorAll('.wizard-content').forEach(content => {
                content.classList.remove('active');
                if (parseInt(content.dataset.step) === currentStep) {
                    content.classList.add('active');
                }
            });
        }
        
        function renderFinalSummary() {
            const list = document.getElementById('finalItemsList');
            
            // 計算小計（每個項目扣除單項優惠後的金額）
            const subtotal = selectedItems.reduce((sum, item) => {
                const originalTotal = item.quantity * item.price;
                const afterDiscount = originalTotal - item.salesDiscount - item.companyDiscount;
                return sum + (item.isFree ? 0 : afterDiscount);
            }, 0);
            
            // 計算總計（小計扣除整單優惠）
            const grandTotal = subtotal - globalSalesDiscount - globalCompanyDiscount;
            
            list.innerHTML = selectedItems.map(item => {
                const originalTotal = item.quantity * item.price;
                const afterDiscount = originalTotal - item.salesDiscount - item.companyDiscount;
                const hasDiscount = item.salesDiscount > 0 || item.companyDiscount > 0;
                
                return `
                <div style="padding: 12px; border-bottom: 1px solid #e2e8f0;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <strong>${item.name}</strong>
                        <strong>$${(item.isFree ? 0 : afterDiscount).toLocaleString()}</strong>
                    </div>
                    <div style="color: #666; font-size: 0.9em;">
                        ${item.quantity} ${item.unit} × $${item.price.toLocaleString()}
                        ${item.isFree ? ' = <span style="color: #10b981; font-weight: bold;">公司贈送</span>' : ''}
                    </div>
                    ${hasDiscount && !item.isFree ? `
                    <div style="font-size: 0.85em; color: #666; margin-top: 5px;">
                        原價：$${originalTotal.toLocaleString()}
                        ${item.salesDiscount > 0 ? `<br><span style="color: #3b82f6;">業務優惠：-$${item.salesDiscount.toLocaleString()}</span>` : ''}
                        ${item.companyDiscount > 0 ? `<br><span style="color: #10b981;">公司優惠：-$${item.companyDiscount.toLocaleString()}</span>` : ''}
                    </div>
                    ` : ''}
                </div>
                `;
            }).join('');
            
            document.getElementById('totalItems').textContent = selectedItems.length;
            document.getElementById('subtotal').textContent = subtotal.toLocaleString();
            
            // 顯示/隱藏整單優惠行
            if (globalSalesDiscount > 0) {
                document.getElementById('globalSalesRow').style.display = 'flex';
                document.getElementById('globalSalesAmount').textContent = globalSalesDiscount.toLocaleString();
            } else {
                document.getElementById('globalSalesRow').style.display = 'none';
            }
            
            if (globalCompanyDiscount > 0) {
                document.getElementById('globalCompanyRow').style.display = 'flex';
                document.getElementById('globalCompanyAmount').textContent = globalCompanyDiscount.toLocaleString();
            } else {
                document.getElementById('globalCompanyRow').style.display = 'none';
            }
            
            document.getElementById('grandTotal').textContent = grandTotal.toLocaleString();
        }
        
        // 設定整單業務優惠
        function setGlobalSalesDiscount() {
            const subtotal = selectedItems.reduce((sum, item) => {
                const originalTotal = item.quantity * item.price;
                const afterDiscount = originalTotal - item.salesDiscount - item.companyDiscount;
                return sum + (item.isFree ? 0 : afterDiscount);
            }, 0);
            
            const type = prompt('選擇整單業務優惠方式：\n1 = 固定金額\n2 = 折扣比例（例如：9折）', '1');
            if (!type) return;
            
            if (type === '1') {
                const amount = prompt(`整單業務優惠金額（小計：$${subtotal.toLocaleString()}）:`, globalSalesDiscount || '0');
                if (amount === null) return;
                
                const discount = parseFloat(amount);
                if (isNaN(discount) || discount < 0) {
                    alert('請輸入有效的金額！');
                    return;
                }
                
                if (discount > subtotal) {
                    alert('優惠金額不能超過小計！');
                    return;
                }
                
                globalSalesDiscount = discount;
            } else if (type === '2') {
                const percent = prompt('整單折扣（例如：9 = 9折，85 = 85折）:', '9');
                if (percent === null) return;
                
                const discount = parseFloat(percent);
                if (isNaN(discount) || discount <= 0 || discount >= 100) {
                    alert('請輸入有效的折扣（1-99）！');
                    return;
                }
                
                globalSalesDiscount = Math.round(subtotal * (100 - discount) / 100);
            } else {
                alert('請輸入 1 或 2');
                return;
            }
            
            renderFinalSummary();
        }
        
        // 設定整單公司優惠
        function setGlobalCompanyDiscount() {
            const subtotal = selectedItems.reduce((sum, item) => {
                const originalTotal = item.quantity * item.price;
                const afterDiscount = originalTotal - item.salesDiscount - item.companyDiscount;
                return sum + (item.isFree ? 0 : afterDiscount);
            }, 0);
            const afterGlobalSales = subtotal - globalSalesDiscount;
            
            const type = prompt('選擇整單公司優惠方式：\n1 = 固定金額\n2 = 折扣比例（例如：9折）', '1');
            if (!type) return;
            
            if (type === '1') {
                const amount = prompt(`整單公司優惠金額（扣除整單業務優惠後：$${afterGlobalSales.toLocaleString()}）:`, globalCompanyDiscount || '0');
                if (amount === null) return;
                
                const discount = parseFloat(amount);
                if (isNaN(discount) || discount < 0) {
                    alert('請輸入有效的金額！');
                    return;
                }
                
                if (discount > afterGlobalSales) {
                    alert('優惠金額不能超過扣除整單業務優惠後的金額！');
                    return;
                }
                
                globalCompanyDiscount = discount;
            } else if (type === '2') {
                const percent = prompt('整單折扣（例如：9 = 9折，85 = 85折）:', '9');
                if (percent === null) return;
                
                const discount = parseFloat(percent);
                if (isNaN(discount) || discount <= 0 || discount >= 100) {
                    alert('請輸入有效的折扣（1-99）！');
                    return;
                }
                
                globalCompanyDiscount = Math.round(afterGlobalSales * (100 - discount) / 100);
            } else {
                alert('請輸入 1 或 2');
                return;
            }
            
            renderFinalSummary();
        }
        
        function saveQuote() {
            const projects = JSON.parse(localStorage.getItem('projects') || '[]');
            const nextId = parseInt(localStorage.getItem('nextProjectId') || '2');
            
            const currentYear = new Date().getFullYear();
            const newProject = {
                id: `P-${currentYear}${String(nextId).padStart(3, '0')}`,
                storeName: document.getElementById('storeName').value,
                address: document.getElementById('address').value,
                contact: document.getElementById('contact').value || '-',
                phone: document.getElementById('phone').value || '-',
                contractorName: document.getElementById('contractorName').value || '',
                lineId: '',
                rooms: parseInt(document.getElementById('rooms').value) || 0,
                openSeats: parseInt(document.getElementById('openSeats').value) || 0,
                area: parseInt(document.getElementById('area').value) || 0,
                status: 'quoted',
                assignee: document.getElementById('assignee').value,
                createdDate: new Date().toISOString().split('T')[0],
                quoteDate: new Date().toISOString().split('T')[0],
                signDate: null,
                startDate: null,
                expectedEndDate: null,
                completedDate: null,
                totalAmount: selectedItems.reduce((sum, item) => sum + item.total, 0),
                paidAmount: 0,
                quoteVersions: [{
                    version: 'v1',
                    date: new Date().toISOString().split('T')[0],
                    totalAmount: selectedItems.reduce((sum, item) => sum + item.total, 0),
                    operator: JSON.parse(localStorage.getItem('currentUser')).id,
                    reason: '初次報價',
                    note: document.getElementById('notes').value || '',
                    items: selectedItems.map(item => ({
                        itemId: item.id,
                        name: item.name,
                        quantity: item.quantity,
                        price: item.customPrice,
                        total: item.total,
                        salesDiscount: item.salesDiscount || 0,
                        companyDiscount: item.companyDiscount || 0,
                        note: item.note || ''
                    }))
                }],
                payments: [],
                progress: [],
                statusLogs: [{
                    date: new Date().toISOString().split('T')[0],
                    status: '報價建立',
                    operator: JSON.parse(localStorage.getItem('currentUser')).id,
                    note: `初次報價 $${selectedItems.reduce((sum, item) => sum + item.total, 0).toLocaleString()}`
                }]
            };
            
            projects.push(newProject);
            localStorage.setItem('projects', JSON.stringify(projects));
            localStorage.setItem('nextProjectId', String(nextId + 1));
            
            alert('報價單建立成功！');
            location.href = 'project.html?id=' + newProject.id;
        }
        
        init();
    </script>
</body>
</html>
